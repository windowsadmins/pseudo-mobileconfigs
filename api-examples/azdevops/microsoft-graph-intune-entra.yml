# ─── Graph API Entitlements ────────────────────────────────────────────
# This pipeline requires the following Microsoft Graph API permissions:
#   - DeviceManagementConfiguration.ReadWrite.All (Application) — Manage Intune
#     configuration profiles and policies
#   - DeviceManagementApps.ReadWrite.All (Application) — Manage Microsoft Store
#     apps and assignment to groups
#   - DeviceManagementServiceConfig.ReadWrite.All (Application) — Settings
#     Catalog operations
#   - Group.Read.All (Application) — Resolve target groups for assignments
# ───────────────────────────────────────────────────────────────────────
# Description: Azure DevOps pipeline to push Intune policy profiles and Microsoft Store apps from YAML files and assign them to groups based on manifests.

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - profiles/**
      - deployment/manifests/**

pool:
  vmImage: 'windows-latest'

variables:
- group: intune-pipeline-secrets

# Pipeline parameters for manual runs
parameters:
- name: forceFullRun
  displayName: 'Force full run (skip detection, run all stages)'
  type: boolean
  default: false
- name: targetSerials
  displayName: 'Targeted serials (comma-separated, e.g. ABC1234567,XYZ9876543)'
  type: string
  default: ' '
- name: targetManifest
  displayName: 'Targeted manifest path (e.g. Assigned/Staff/IT)'
  type: string
  default: ' '
- name: applyManagedExclusions
  displayName: 'Apply manifest managed_uninstalls as Intune profile exclusions (off = log the plan only)'
  type: boolean
  default: false

stages:
#------------------------------------------------------------------------------
# STAGE 0: Detect manifest changes for targeted group sync
#------------------------------------------------------------------------------
- stage: detectManifestChanges
  displayName: "Detect Manifest Changes"
  jobs:
    - job: detectChanges
      displayName: "Check for changed manifests"
      pool:
        vmImage: 'windows-latest'
      steps:
        - checkout: self
          fetchDepth: 2
          persistCredentials: true
        - task: PowerShell@2
          displayName: "Detect changed manifests"
          name: setVars
          inputs:
            targetType: 'inline'
            script: |
              $forceFullRun = '${{ parameters.forceFullRun }}' -eq 'True'
              $targetSerials = '${{ parameters.targetSerials }}'.Trim()
              $targetManifest = '${{ parameters.targetManifest }}'.Trim()
              
              # --- Targeted mode: serial numbers or manifest path provided ---
              if ($targetSerials -or $targetManifest) {
                  Write-Host "Targeted mode enabled"
                  $manifestsChanged = "true"
                  $targetedMode = "true"
              
                  if ($targetManifest) {
                      $cleanManifest = $targetManifest -replace '\.ya?ml$', ''
                      $changedManifestPaths = "deployment/manifests/$cleanManifest.yaml"
                      Write-Host "Targeted manifest: $changedManifestPaths"
                  }
                  elseif ($targetSerials) {
                      # Look up serials in computers.csv to find their manifest paths
                      $csvPath = "$(Build.SourcesDirectory)\deployment\enroll\computers.csv"
                      $computers = Import-Csv $csvPath
                      $paths = @()
                      foreach ($serial in ($targetSerials -split ',')) {
                          $serial = $serial.Trim()
                          $row = $computers | Where-Object { $_.serial -eq $serial }
                          if (-not $row) {
                              Write-Host "WARNING: Serial $serial not found in computers.csv, skipping"
                              continue
                          }
                          $usage = $row.usage
                          $catalog = $row.catalog
                          $area = $row.area
                          $mpath = "deployment/manifests/$usage/$catalog/$area.yaml"
                          Write-Host "Serial $serial -> $mpath"
                          if ($paths -notcontains $mpath) {
                              $paths += $mpath
                          }
                      }
                      $changedManifestPaths = ($paths -join ";")
                  }
              }
              elseif ($forceFullRun) {
                  Write-Host "Force full run enabled - all stages will execute"
                  $manifestsChanged = "true"
                  $changedManifestPaths = "__ALL__"
                  $targetedMode = "false"
              }
              else {
                  $changedFiles = $null
                  $targetedMode = "false"
                  try {
                      $changedFiles = git diff --name-only HEAD~1 HEAD 2>$null
                      if ($LASTEXITCODE -ne 0) {
                          $changedFiles = @()
                      }
                  }
                  catch {
                      $changedFiles = @()
                  }
                  
                  $manifestChanges = $changedFiles | Where-Object { $_ -like "deployment/manifests/*" }
                  $manifestsChanged = ($manifestChanges.Count -gt 0).ToString().ToLower()
                  $changedManifestPaths = ($manifestChanges -join ";")
              }
              
              Write-Host "ManifestsChanged = $manifestsChanged"
              Write-Host "ChangedManifestPaths = $changedManifestPaths"
              Write-Host "TargetedMode     = $targetedMode"
              Write-Host "TargetSerials    = $targetSerials"
              
              echo "##vso[task.setvariable variable=ManifestsChanged;isOutput=true]$manifestsChanged"
              echo "##vso[task.setvariable variable=ChangedManifestPaths;isOutput=true]$changedManifestPaths"
              echo "##vso[task.setvariable variable=TargetedMode;isOutput=true]$targetedMode"
              echo "##vso[task.setvariable variable=TargetSerials;isOutput=true]$targetSerials"

#------------------------------------------------------------------------------
# STAGE 1: Push Intune Profiles from /profiles/*.yaml
#------------------------------------------------------------------------------
- stage: pushProfiles
  displayName: "Push Profiles"

  jobs:
    - job: syncProfiles
      displayName: "Send profiles to Intune"
      steps:
        - checkout: self
          fetchDepth: 1  # Only need current commit for profile upload

        - task: PowerShell@2
          displayName: "Detect changed profile files"
          name: detectChanges
          inputs:
            targetType: 'inline'
            script: |
              # Detect which profile files changed - now handles batched commits properly
              
              # Get changed files - improved logic to handle batched commits
              $changedFiles = $null
              $comparisonBase = $null
              
              try {
                  # Method 1: Try to get the last successful build's commit from Azure DevOps API
                  Write-Host "Attempting to find last successful build commit..."
                  $apiUrl = "$(System.TeamFoundationCollectionUri)$(System.TeamProject)/_apis/build/builds?definitions=$(System.DefinitionId)&statusFilter=completed&resultFilter=succeeded&`$top=1&api-version=7.0"
                  
                  try {
                      $headers = @{
                          Authorization = "Bearer $(System.AccessToken)"
                      }
                      $lastSuccessfulBuild = Invoke-RestMethod -Uri $apiUrl -Headers $headers -Method Get
                      
                      if ($lastSuccessfulBuild.count -gt 0 -and $lastSuccessfulBuild.value[0].sourceVersion) {
                          $lastCommit = $lastSuccessfulBuild.value[0].sourceVersion
                          
                          # Check if we have this commit in our shallow clone
                          git cat-file -e $lastCommit 2>$null
                          if ($LASTEXITCODE -eq 0) {
                              $comparisonBase = $lastCommit
                              Write-Host "Found last successful build at commit: $lastCommit"
                              $changedFiles = git diff --name-only $lastCommit HEAD 2>$null
                          }
                          else {
                              Write-Host "Last successful commit $lastCommit not in shallow clone, trying alternative method..."
                          }
                      }
                  }
                  catch {
                      Write-Host "Could not query Azure DevOps API (expected in some scenarios): $_"
                  }
                  
                  # Method 2: If API method didn't work, look at recent commits to catch batched pushes
                  if (-not $changedFiles) {
                      Write-Host "Checking last 10 commits for profile changes (handles batched commits)..."
                      $comparisonBase = "HEAD~10"
                      $changedFiles = git diff --name-only HEAD~10 HEAD 2>$null
                      
                      if ($LASTEXITCODE -ne 0) {
                          # Method 3: Final fallback to HEAD~1 (original behavior)
                          Write-Host "Using fallback: HEAD~1..HEAD"
                          $comparisonBase = "HEAD~1"
                          $changedFiles = git diff --name-only HEAD~1 HEAD 2>$null
                      }
                  }
                  
                  if ($LASTEXITCODE -ne 0) {
                      Write-Host "Git diff failed (possibly first commit) - processing ALL profiles"
                      Write-Host "##vso[task.setvariable variable=changedProfiles;isOutput=true]ALL"
                      Write-Host "##vso[task.setvariable variable=hasChanges;isOutput=true]true"
                      return
                  }
              }
              catch {
                  Write-Host "Could not determine changed files - processing ALL profiles"
                  Write-Host "##vso[task.setvariable variable=changedProfiles;isOutput=true]ALL"
                  Write-Host "##vso[task.setvariable variable=hasChanges;isOutput=true]true"
                  return
              }
              
              Write-Host "Comparing against: $comparisonBase"
              Write-Host "Changed files found: $($changedFiles.Count)"
              
              # Filter to only profile YAML files (excluding Apps subdirectory which is for Store apps)
              $profileChanges = $changedFiles | Where-Object { 
                  ($_ -like "profiles/*.yaml" -or $_ -like "profiles/**/*.yaml") -and
                  ($_ -notlike "profiles/Apps/*")
              }
              
              if ($profileChanges.Count -eq 0) {
                  Write-Host "No profile changes detected in commit range"
                  Write-Host "##vso[task.setvariable variable=changedProfiles;isOutput=true]NONE"
                  Write-Host "##vso[task.setvariable variable=hasChanges;isOutput=true]false"
              }
              else {
                  Write-Host "Changed profile files ($($profileChanges.Count)):"
                  $profileChanges | ForEach-Object { Write-Host "  - $_" }
                  
                  # Pass the list as semicolon-separated for parsing
                  $profileList = $profileChanges -join ";"
                  Write-Host "##vso[task.setvariable variable=changedProfiles;isOutput=true]$profileList"
                  Write-Host "##vso[task.setvariable variable=hasChanges;isOutput=true]true"
              }
          env:
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)

        - task: PowerShell@2
          displayName: "Install required PowerShell modules"
          condition: eq(variables['detectChanges.hasChanges'], 'true')
          inputs:
            targetType: 'inline'
            script: |
              Install-Module powershell-yaml -Force -AllowClobber

        # WIF: AzurePowerShell@5 runs Connect-AzAccount as the pipeline managed identity
        # via the IntuneGraphConnection service connection; the bearer token
        # comes from Get-AzAccessToken instead of a client-secret Get-MsalToken.
        - task: AzurePowerShell@5
          displayName: "Push Intune Profiles"
          condition: eq(variables['detectChanges.hasChanges'], 'true')
          inputs:
            azureSubscription: 'IntuneGraphConnection'
            azurePowerShellVersion: 'LatestVersion'
            ScriptType: 'InlineScript'
            Inline: |
              # ===================================================================
              #  PUSH PROFILES SCRIPT
              #  Using HttpClient approach for robust error logging
              #  With incremental change detection for efficiency
              # ===================================================================

              $ProfilesPath = "$(Build.SourcesDirectory)\profiles"
              $ChangedProfiles = "$(detectChanges.changedProfiles)"

              # Exclusion array - profiles to keep even if not in repo
              $ExcludeFromDeletion = @(
                  "Security Patches for Assigned Devices",
                  "Security Patches for Shared Devices",
                  "Enable Location Service"
              )

              Import-Module powershell-yaml

              # -------------------------------------------------------------------
              $global:httpClient = $null
              function Get-HttpClient {
                  if (-not $global:httpClient) {
                      $global:httpClient = New-Object System.Net.Http.HttpClient
                  }
                  return $global:httpClient
              }
              function Dispose-HttpClient {
                  if ($global:httpClient) {
                      $global:httpClient.Dispose()
                      $global:httpClient = $null
                  }
              }

              # -------------------------------------------------------------------
              function Get-AccessToken {
                  # AzurePowerShell@5 has already Connect-AzAccount'd as the pipeline managed identity.
                  $token = (Get-AzAccessToken -ResourceUrl "https://graph.microsoft.com").Token
                  # Az.Accounts 5.x returns .Token as a SecureString by default; convert to
                  # plaintext so the bearer header is a valid JWT (else Graph rejects it with
                  # InvalidAuthenticationToken / IDX14102 "cannot decode header").
                  if ($token -is [System.Security.SecureString]) {
                      $token = [System.Net.NetworkCredential]::new('', $token).Password
                  }
                  if (!$token) {
                      throw "Failed to obtain access token."
                  }
                  return $token
              }

              # -------------------------------------------------------------------
              function Do-HttpRequest {
                  param(
                      [string] $Method,      # "POST", "PATCH", "GET"
                      [string] $Url,
                      [Object] $Body,
                      [string] $Token
                  )

                  $json = $null
                  if ($Body) {
                      $json = ($Body | ConvertTo-Json -Depth 10)
                  }

                  $maxAttempts = 6
                  $attempt = 0
                  while ($true) {
                      $attempt++
                      $message = New-Object System.Net.Http.HttpRequestMessage($Method, $Url)
                      $message.Headers.Add("Authorization", "Bearer $Token")
                      $message.Content = $null
                      if ($json) {
                          $message.Content = New-Object System.Net.Http.StringContent($json, [System.Text.Encoding]::UTF8, "application/json")
                      }

                      $client = Get-HttpClient
                      $response = $client.SendAsync($message).Result
                      $content  = $response.Content.ReadAsStringAsync().Result

                      if ($response.IsSuccessStatusCode) {
                          # Pace writes to avoid Graph throttling
                          if ($Method -ne "GET") { Start-Sleep -Milliseconds 150 }
                          if ($content) {
                              try   { return $content | ConvertFrom-Json }
                              catch { return $content }
                          }
                          return $null
                      }

                      $status = [int]$response.StatusCode
                      $isRetryable = ($status -eq 429 -or $status -eq 503 -or $status -eq 504)
                      if (-not $isRetryable -or $attempt -ge $maxAttempts) {
                          throw "HTTP $($response.StatusCode) $($response.ReasonPhrase): $content"
                      }

                      $waitSec = 0
                      if ($response.Headers.RetryAfter -and $response.Headers.RetryAfter.Delta) {
                          $waitSec = [int]$response.Headers.RetryAfter.Delta.TotalSeconds
                      }
                      if ($waitSec -le 0) {
                          $waitSec = [int][Math]::Min(60, [Math]::Pow(2, $attempt) + (Get-Random -Minimum 0 -Maximum 3))
                      }
                      Write-Warning "HTTP $status throttled on $Method $Url (attempt $attempt/$maxAttempts) - waiting ${waitSec}s"
                      Start-Sleep -Seconds $waitSec
                  }
              }

              # -------------------------------------------------------------------
              function Get-AllIntuneConfigs {
                  param([string] $AccessToken)

                  # Get Windows Custom Configurations
                  $windowsUrl = "https://graph.microsoft.com/v1.0/deviceManagement/deviceConfigurations"
                  $windowsConfigs = @()
                  $next = $windowsUrl
                  while ($next) {
                      $resp = Do-HttpRequest -Method "GET" -Url $next -Token $AccessToken
                      $items = $resp.value
                      if ($items) { $windowsConfigs += $items }
                      $next = $resp.'@odata.nextLink'
                  }
                  $windowsConfigs = $windowsConfigs | Where-Object { $_.'@odata.type' -like "*windows*" }

                  # Get Settings Catalog Policies
                  $catalogUrl = "https://graph.microsoft.com/beta/deviceManagement/configurationPolicies"
                  $catalogPolicies = @()
                  $next = $catalogUrl
                  while ($next) {
                      $resp = Do-HttpRequest -Method "GET" -Url $next -Token $AccessToken
                      $items = $resp.value
                      if ($items) { $catalogPolicies += $items }
                      $next = $resp.'@odata.nextLink'
                  }
                  $catalogPolicies = $catalogPolicies | Where-Object { $_.'@odata.type' -eq "#microsoft.graph.deviceManagementConfigurationPolicy" }

                  # Combine both types
                  $allConfigs = @()
                  $allConfigs += $windowsConfigs
                  $allConfigs += $catalogPolicies

                  return $allConfigs
              }

              # -------------------------------------------------------------------
              function Load-LocalProfiles {
                  param([string] $ProfilesDir)
                  if (-not (Test-Path $ProfilesDir)) {
                      throw "Profiles directory not found: $ProfilesDir"
                  }
                  $items = Get-ChildItem -Path $ProfilesDir -Recurse -Include '*.yaml'
                  $parsed = @()
                  foreach ($item in $items) {
                      try {
                          $yaml = Get-Content -Raw $item.FullName | ConvertFrom-Yaml
                          # Only include OMA-URI profiles (must have omaSettings, not settingsCatalog)
                          if ($yaml -and $yaml.displayName -and $yaml.omaSettings) {
                              $parsed += [pscustomobject]@{
                                  file = $item.FullName
                                  data = $yaml
                              }
                          }
                      }
                      catch {
                          Write-Warning "Skipping invalid YAML file: $($item.FullName) => $_"
                      }
                  }
                  return $parsed
              }

              # -------------------------------------------------------------------
              function Get-RepoProfileNames {
                  param([string] $ProfilesDir)
                  if (-not (Test-Path $ProfilesDir)) {
                      return @()
                  }
                  $items = Get-ChildItem -Path $ProfilesDir -Recurse -Include '*.yaml'
                  $names = @()
                  foreach ($item in $items) {
                      try {
                          $yaml = Get-Content -Raw $item.FullName | ConvertFrom-Yaml
                          # Only include OMA-URI profiles (not settingsCatalog)
                          if ($yaml -and $yaml.displayName -and $yaml.omaSettings) {
                              $names += $yaml.displayName
                          }
                      }
                      catch {}
                  }
                  return $names
              }

              # -------------------------------------------------------------------
              function Map-DataTypeToODataType {
                  param([string] $dataType)
              
                  switch -Regex ($dataType.ToLower()) {
                      '^boolean$'        { '#microsoft.graph.omaSettingBoolean' }
                      '^integer$'        { '#microsoft.graph.omaSettingInteger' }
                      '^string\s*\(xml'  { '#microsoft.graph.omaSettingString' }
                      '^xml$'            { '#microsoft.graph.omaSettingString' }
                      '^base64'          { '#microsoft.graph.omaSettingBase64' }
                      '^string$'         { '#microsoft.graph.omaSettingString' }
                      default            { '#microsoft.graph.omaSettingString' }
                  }
              }

              function Transform-OmaSetting {
                  param([psobject] $s)
              
                  $odata       = Map-DataTypeToODataType $s.dataType
                  $displayName = if ($s.name) { $s.name } else { 'Untitled OMA Setting' }
              
                  $obj = [ordered]@{
                      '@odata.type' = $odata
                      displayName   = $displayName
                      description   = $s.description
                      omaUri        = $s.omaUri
                  }
              
                  # value → string
                  if ($s.value -is [bool])       { $obj.value = $s.value.ToString().ToLower() }
                  elseif ($s.value -is [int])    { $obj.value = "$($s.value)" }
                  elseif ($s.value)              { $obj.value = [string]$s.value }
                  else                           { $obj.value = '' }
              
                  # Base64 encoding for policies that require it
                  if ($odata -eq '#microsoft.graph.omaSettingBase64' -and ($obj.value -notmatch '^[A-Za-z0-9+/]+=*$')) {
                      $bytes      = [Text.Encoding]::UTF8.GetBytes([string]$obj.value)
                      $obj.value  = [Convert]::ToBase64String($bytes)
                  }
              
                  # fileName only for Base64 settings (Graph rejects unknown properties for other types)
                  if ($odata -eq '#microsoft.graph.omaSettingBase64') {
                      if ($s.fileName) { 
                          $obj.fileName = $s.fileName
                      }
                      elseif ($s.name) { 
                          # Default to .xml for AppLocker/policy content, but support .cer for certificates
                          if ($s.name -like "*cert*" -or $s.omaUri -like "*certificate*") {
                              $obj.fileName = "$($s.name).cer"
                          } else {
                              $obj.fileName = "$($s.name).xml"
                          }
                      }
                      else { 
                          # Default based on OMA URI context
                          if ($s.omaUri -like "*certificate*") {
                              $obj.fileName = 'certificate.cer'
                          } else {
                              $obj.fileName = 'Policy.xml'
                          }
                      }
                  }
              
                  return $obj
              }

              # -------------------------------------------------------------------
              function Convert-YamlProfileToIntunePayload {
                  param([PSObject] $p)

                  # Determine profile type based on content
                  if ($p.settingsCatalog) {
                      # Settings Catalog profile
                      $payload = [ordered]@{
                          "@odata.type" = "#microsoft.graph.deviceManagementConfigurationPolicy"
                          "name" = $p.displayName
                          "description" = if ($p.description) { $p.description } else { "" }
                          "platforms" = if ($p.platform) { $p.platform } else { "windows10" }
                          "technologies" = "mdm"
                          "roleScopeTagIds" = @("0")
                      }
                      return $payload
                  }
                  else {
                      # Traditional OMA-URI profile
                      $payload = [ordered]@{
                          "@odata.type" = "#microsoft.graph.windows10CustomConfiguration"
                          "displayName" = $p.displayName
                          "description" = $p.description
                      }

                      if ($p.omaSettings) {
                          $transformed = @()
                          foreach ($s in $p.omaSettings) {
                              $transformed += Transform-OmaSetting $s
                          }
                          $payload.omaSettings = $transformed
                      }
                      if ($p.customOmaUri) {
                          if (-not $payload.omaSettings) { $payload.omaSettings = @() }
                          foreach ($s in $p.customOmaUri) {
                              $payload.omaSettings += Transform-OmaSetting $s
                          }
                      }
                      return $payload
                  }
              }

              # -------------------------------------------------------------------
              # Sync-hash helpers.
              #
              # Every blind PATCH on a windows10CustomConfiguration / configurationPolicy
              # increments its version, which invalidates every assigned user/device's
              # last evaluation and forces a re-check on the next MDM poll. For
              # user-scope OMA-URI policies that re-check requires a live user SSO
              # session, which devices with expired MDM certs or workplace-join (Entra-
              # registered) cannot do silently — they end up stuck "pending" forever.
              #
              # We compute a stable hash over the canonical payload we would send and
              # stash it in the `description` field as a `[cimian-sync-hash:<hex>]`
              # marker. Patch-Profile reads the marker back via GET and skips the PATCH
              # when it matches the locally-computed hash.
              $script:CimianSyncHashTag = 'cimian-sync-hash'

              function Get-StableJson {
                  param([Parameter(Mandatory)] $InputObject)
                  # Sort hashtable keys recursively so JSON output is order-independent.
                  $normalize = {
                      param($v)
                      if ($null -eq $v) { return $null }
                      if ($v -is [System.Collections.IDictionary]) {
                          $sorted = [ordered]@{}
                          foreach ($k in ($v.Keys | Sort-Object)) {
                              $sorted[$k] = & $normalize $v[$k]
                          }
                          return $sorted
                      }
                      if ($v -is [System.Collections.IEnumerable] -and $v -isnot [string]) {
                          return @($v | ForEach-Object { & $normalize $_ })
                      }
                      if ($v -is [psobject] -and $v.PSObject.Properties.Count -gt 0) {
                          $sorted = [ordered]@{}
                          foreach ($p in ($v.PSObject.Properties.Name | Sort-Object)) {
                              $sorted[$p] = & $normalize $v.$p
                          }
                          return $sorted
                      }
                      return $v
                  }
                  $norm = & $normalize $InputObject
                  return ($norm | ConvertTo-Json -Depth 25 -Compress)
              }

              function Get-Sha256Hex {
                  param([Parameter(Mandatory)][string] $Text)
                  $sha = [System.Security.Cryptography.SHA256]::Create()
                  try {
                      $bytes = [System.Text.Encoding]::UTF8.GetBytes($Text)
                      return -join ($sha.ComputeHash($bytes) | ForEach-Object { $_.ToString('x2') })
                  }
                  finally { $sha.Dispose() }
              }

              function Get-ProfileSyncHash {
                  param(
                      [PSObject] $Profile,
                      [PSObject] $YamlProfile
                  )
                  # Hash a deterministic representation of *what we would send*, not the
                  # raw YAML — covers Transform-OmaSetting normalization and Settings
                  # Catalog setting expansion. Sort arrays whose order isn't semantic.
                  # Sort-Object -Property <name> uses PSObject property binding which
                  # doesn't traverse OrderedDictionary keys — use the scriptblock form.
                  if ($Profile.'@odata.type' -eq '#microsoft.graph.deviceManagementConfigurationPolicy') {
                      $settings = @()
                      if ($YamlProfile.settingsCatalog) {
                          foreach ($s in $YamlProfile.settingsCatalog) {
                              $settings += [ordered]@{
                                  definitionId = [string]$s.definitionId
                                  valueType    = [string]$s.valueType
                                  value        = [string]$s.value
                              }
                          }
                          $settings = @($settings | Sort-Object -Property { $_.definitionId })
                      }
                      $shape = [ordered]@{
                          kind        = 'settingsCatalog'
                          name        = [string]$Profile.name
                          platforms   = [string]$Profile.platforms
                          technologies = [string]$Profile.technologies
                          settings    = @($settings)
                      }
                  }
                  else {
                      $oma = @()
                      if ($Profile.omaSettings) {
                          foreach ($s in $Profile.omaSettings) {
                              $oma += [ordered]@{
                                  '@odata.type' = [string]$s.'@odata.type'
                                  displayName   = [string]$s.displayName
                                  description   = [string]$s.description
                                  omaUri        = [string]$s.omaUri
                                  value         = [string]$s.value
                                  fileName      = [string]$s.fileName
                              }
                          }
                          $oma = @($oma | Sort-Object -Property { $_.omaUri })
                      }
                      $shape = [ordered]@{
                          kind        = 'windows10Custom'
                          displayName = [string]$Profile.displayName
                          omaSettings = @($oma)
                      }
                  }
                  return Get-Sha256Hex (Get-StableJson $shape)
              }

              function Get-DescriptionWithoutHashMarker {
                  param([string] $Description)
                  if (-not $Description) { return '' }
                  $pattern = '(?ms)\s*\[' + [regex]::Escape($script:CimianSyncHashTag) + ':[0-9a-fA-F]+\]\s*$'
                  return ([regex]::Replace($Description, $pattern, '')).TrimEnd()
              }

              function Extract-SyncHash {
                  param([string] $Description)
                  if (-not $Description) { return $null }
                  $m = [regex]::Match($Description, '\[' + [regex]::Escape($script:CimianSyncHashTag) + ':([0-9a-fA-F]+)\]')
                  if ($m.Success) { return $m.Groups[1].Value.ToLower() }
                  return $null
                  }

              function Add-SyncHashToDescription {
                  param(
                      [string] $Description,
                      [string] $Hash
                  )
                  $base = Get-DescriptionWithoutHashMarker $Description
                  $marker = "[$($script:CimianSyncHashTag):$Hash]"
                  if (-not $base) { return $marker }
                  return "$base`n$marker"
              }

              function Stamp-ProfileSyncHash {
                  param(
                      [PSObject] $Profile,
                      [PSObject] $YamlProfile
                  )
                  # The payload is built as [ordered]@{} (OrderedDictionary). PSObject's
                  # adapter doesn't expose dictionary keys as properties — it shows the
                  # .NET surface (Count, Keys, Values, ...) — so an existence check via
                  # $Profile.PSObject.Properties.Name silently misses 'description' and
                  # the stamp no-ops. Use the dictionary indexer instead; it also works
                  # for PSCustomObject if a caller ever passes one.
                  $hash = Get-ProfileSyncHash -Profile $Profile -YamlProfile $YamlProfile
                  $current = if ($Profile -is [System.Collections.IDictionary]) { [string]$Profile['description'] } else { [string]$Profile.description }
                  $stamped = Add-SyncHashToDescription -Description $current -Hash $hash
                  if ($Profile -is [System.Collections.IDictionary]) { $Profile['description'] = $stamped } else { $Profile.description = $stamped }
                  return $hash
              }

              # -------------------------------------------------------------------
              function Create-Profile {
                  param(
                      [PSObject] $profile,
                      [PSObject] $yamlProfile,
                      [string] $accessToken
                  )

                  [void](Stamp-ProfileSyncHash -Profile $profile -YamlProfile $yamlProfile)

                  if ($profile.'@odata.type' -eq "#microsoft.graph.deviceManagementConfigurationPolicy") {
                      # Settings Catalog profile
                      $url = "https://graph.microsoft.com/beta/deviceManagement/configurationPolicies"
                      $created = Do-HttpRequest -Method "POST" -Url $url -Body $profile -Token $accessToken
                      
                      # Add settings to the created policy
                      if ($yamlProfile.settingsCatalog) {
                          foreach ($setting in $yamlProfile.settingsCatalog) {
                              $settingBody = [ordered]@{
                                  "@odata.type" = "#microsoft.graph.deviceManagementConfigurationSetting"
                                  settingInstance = [ordered]@{
                                      "@odata.type" = "#microsoft.graph.deviceManagementConfigurationSimpleSettingInstance"
                                      settingDefinitionId = $setting.definitionId
                                      simpleSettingValue = [ordered]@{
                                          "@odata.type" = switch ($setting.valueType.ToLower()) {
                                              "boolean" { "#microsoft.graph.deviceManagementConfigurationBooleanSettingValue" }
                                              "integer" { "#microsoft.graph.deviceManagementConfigurationIntegerSettingValue" }
                                              default { "#microsoft.graph.deviceManagementConfigurationStringSettingValue" }
                                          }
                                          value = switch ($setting.valueType.ToLower()) {
                                              "boolean" { [bool]$setting.value }
                                              "integer" { [int]$setting.value }
                                              default { [string]$setting.value }
                                          }
                                      }
                                  }
                              }
                              $settingUrl = "https://graph.microsoft.com/beta/deviceManagement/configurationPolicies/$($created.id)/settings"
                              Do-HttpRequest -Method "POST" -Url $settingUrl -Body $settingBody -Token $accessToken
                          }
                      }
                      Write-Host "Created new Settings Catalog profile: $($profile.name)"
                  }
                  else {
                      # Traditional Windows Custom Configuration
                      $url = "https://graph.microsoft.com/v1.0/deviceManagement/deviceConfigurations"
                      Do-HttpRequest -Method "POST" -Url $url -Body $profile -Token $accessToken
                      Write-Host "Created new profile: $($profile.displayName)"
                  }
              }

              # -------------------------------------------------------------------
              function Patch-Profile {
                  param(
                      [PSObject] $profile,
                      [PSObject] $yamlProfile,
                      [string] $accessToken,
                      [string] $existingId,
                      [string] $existingType
                  )

                  $localHash = Stamp-ProfileSyncHash -Profile $profile -YamlProfile $yamlProfile

                  if ($profile.'@odata.type' -eq "#microsoft.graph.deviceManagementConfigurationPolicy") {
                      # Settings Catalog profile
                      $url = "https://graph.microsoft.com/beta/deviceManagement/configurationPolicies/$existingId"

                      try {
                          $remote = Do-HttpRequest -Method "GET" -Url $url -Token $accessToken
                          $remoteHash = Extract-SyncHash -Description ([string]$remote.description)
                          if ($remoteHash -and $remoteHash -eq $localHash) {
                              Write-Host "Skipping PATCH (no change): $($profile.name) [hash=$localHash]"
                              return
                          }
                      }
                      catch {
                          Write-Warning "  Could not read remote profile for hash check: $($_.Exception.Message). Proceeding with PATCH."
                      }

                      Do-HttpRequest -Method "PATCH" -Url $url -Body $profile -Token $accessToken

                      # Replace all settings
                      $currentUrl = "https://graph.microsoft.com/beta/deviceManagement/configurationPolicies/$existingId/settings"
                      $currentSettings = Do-HttpRequest -Method "GET" -Url $currentUrl -Token $accessToken
                      
                      # Delete existing settings
                      foreach ($s in $currentSettings.value) {
                          $deleteUrl = "https://graph.microsoft.com/beta/deviceManagement/configurationPolicies/$existingId/settings/$($s.id)"
                          Do-HttpRequest -Method "DELETE" -Url $deleteUrl -Token $accessToken
                      }
                      
                      # Add new settings
                      if ($yamlProfile.settingsCatalog) {
                          foreach ($setting in $yamlProfile.settingsCatalog) {
                              $settingBody = [ordered]@{
                                  "@odata.type" = "#microsoft.graph.deviceManagementConfigurationSetting"
                                  settingInstance = [ordered]@{
                                      "@odata.type" = "#microsoft.graph.deviceManagementConfigurationSimpleSettingInstance"
                                      settingDefinitionId = $setting.definitionId
                                      simpleSettingValue = [ordered]@{
                                          "@odata.type" = switch ($setting.valueType.ToLower()) {
                                              "boolean" { "#microsoft.graph.deviceManagementConfigurationBooleanSettingValue" }
                                              "integer" { "#microsoft.graph.deviceManagementConfigurationIntegerSettingValue" }
                                              default { "#microsoft.graph.deviceManagementConfigurationStringSettingValue" }
                                          }
                                          value = switch ($setting.valueType.ToLower()) {
                                              "boolean" { [bool]$setting.value }
                                              "integer" { [int]$setting.value }
                                              default { [string]$setting.value }
                                          }
                                      }
                                  }
                              }
                              $settingUrl = "https://graph.microsoft.com/beta/deviceManagement/configurationPolicies/$existingId/settings"
                              Do-HttpRequest -Method "POST" -Url $settingUrl -Body $settingBody -Token $accessToken
                          }
                      }
                      Write-Host "Patched existing Settings Catalog profile: $($profile.name)"
                  }
                  else {
                      # Traditional Windows Custom Configuration
                      $url = "https://graph.microsoft.com/v1.0/deviceManagement/deviceConfigurations/$existingId"

                      try {
                          $remote = Do-HttpRequest -Method "GET" -Url $url -Token $accessToken
                          $remoteHash = Extract-SyncHash -Description ([string]$remote.description)
                          if ($remoteHash -and $remoteHash -eq $localHash) {
                              Write-Host "Skipping PATCH (no change): $($profile.displayName) [hash=$localHash]"
                              return
                          }
                      }
                      catch {
                          Write-Warning "  Could not read remote profile for hash check: $($_.Exception.Message). Proceeding with PATCH."
                      }

                      Do-HttpRequest -Method "PATCH" -Url $url -Body $profile -Token $accessToken
                      Write-Host "Patched existing profile: $($profile.displayName)"
                  }
              }

              # -------------------------------------------------------------------
              function Compare-And-SyncProfile {
                  param(
                      [PSObject] $localProfile,
                      [PSObject] $yamlProfile,
                      [array]    $existingProfiles,
                      [string]   $accessToken
                  )

                  # Find existing profile by display name (check both displayName and name fields)
                  $profileName = if ($localProfile.displayName) { $localProfile.displayName } else { $localProfile.name }
                  $existing = $existingProfiles | Where-Object { 
                      ($_.displayName -eq $profileName) -or ($_.name -eq $profileName)
                  } | Select-Object -First 1

                  try {
                      if ($existing) {
                          Patch-Profile -profile $localProfile -yamlProfile $yamlProfile -accessToken $accessToken -existingId $existing.id -existingType $existing.'@odata.type'
                      }
                      else {
                          Create-Profile -profile $localProfile -yamlProfile $yamlProfile -accessToken $accessToken
                      }
                  }
                  catch {
                      Write-Warning "Failed to sync profile '$profileName': $($_.Exception.Message)"
                      Write-Warning "Continuing anyway..."
                  }
              }

              # -------------------------------------------------------------------
              function Delete-Profile {
                  param(
                      [string] $profileId,
                      [string] $profileName,
                      [string] $accessToken
                  )
                  $url = "https://graph.microsoft.com/v1.0/deviceManagement/deviceConfigurations/$profileId"
                  try {
                      Do-HttpRequest -Method "DELETE" -Url $url -Token $accessToken
                      Write-Host "Deleted profile: $profileName"
                  }
                  catch {
                      Write-Warning "Failed to delete profile '$profileName': $($_.Exception.Message)"
                  }
              }

              # -------------------------------------------------------------------
              # MAIN
              # -------------------------------------------------------------------
              try {
                  $accessToken     = Get-AccessToken
                  $existingProfiles = Get-AllIntuneConfigs -AccessToken $accessToken

                  $localYaml = Load-LocalProfiles -ProfilesDir $ProfilesPath
                  if (!$localYaml) {
                      Write-Host "No local YAML profiles found."
                      Dispose-HttpClient
                      return
                  }

                  # Identify and DELETE OMA-URI profiles not in repo (excluding protected ones)
                  $repoProfileNames = Get-RepoProfileNames -ProfilesDir $ProfilesPath
                  $toDelete = @()
                  foreach ($profile in $existingProfiles) {
                      $odata = $profile.'@odata.type'
                      $displayName = if ($profile.displayName) { $profile.displayName } else { $profile.name }
                      
                      # Only delete custom Windows OMA-URI profiles (NOT Settings Catalog - those are handled in Stage 1.5)
                      if ($odata -like "*windows10CustomConfiguration*") {
                          if ($repoProfileNames -notcontains $displayName -and $ExcludeFromDeletion -notcontains $displayName) {
                              $toDelete += $profile
                          }
                      }
                  }
                  
                  if ($toDelete.Count -gt 0) {
                      Write-Host "`nDeleting $($toDelete.Count) profiles not found in repo:"
                      foreach ($p in $toDelete) {
                          $name = if ($p.displayName) { $p.displayName } else { $p.name }
                          Write-Host "  - $name (id: $($p.id))"
                          Delete-Profile -profileId $p.id -profileName $name -accessToken $accessToken
                      }
                  }
                  else {
                      Write-Host "No profiles to delete."
                  }

                  # Determine which profiles to process based on change detection
                  $profilesToProcess = @()
                  if ($ChangedProfiles -eq "ALL") {
                      Write-Host "`nProcessing ALL OMA-URI profiles (full sync)"
                      $profilesToProcess = $localYaml
                  }
                  else {
                      # Parse the semicolon-separated list of changed files and extract filenames
                      $changedPaths = $ChangedProfiles -split ";"
                      $changedFileNames = @()
                      foreach ($path in $changedPaths) {
                          if ($path) {
                              $changedFileNames += [System.IO.Path]::GetFileName($path)
                          }
                      }
                      Write-Host "`nIncremental mode - only processing changed files: $($changedFileNames -join ', ')"
                      
                      # Match profiles by filename
                      foreach ($p in $localYaml) {
                          $fileName = [System.IO.Path]::GetFileName($p.file)
                          if ($changedFileNames -contains $fileName) {
                              $profilesToProcess += $p
                          }
                      }
                      
                      Write-Host "`nProcessing $($profilesToProcess.Count) changed OMA-URI profile(s)"
                  }

                  if ($profilesToProcess.Count -eq 0) {
                      Write-Host "No OMA-URI profiles to process."
                  }
                  else {
                      foreach ($p in $profilesToProcess) {
                          $yaml = $p.data
                          Write-Host "`n=== Processing: $($yaml.displayName) ==="
                          $payload = Convert-YamlProfileToIntunePayload $yaml
                          Compare-And-SyncProfile -localProfile $payload -yamlProfile $yaml -existingProfiles $existingProfiles -accessToken $accessToken

                          # Re-fetch so we have updated IDs for newly created profiles
                          $existingProfiles = Get-AllIntuneConfigs -AccessToken $accessToken
                      }
                  }

                  Write-Host "`nAll done."
                  Dispose-HttpClient
              }
              catch {
                  Dispose-HttpClient
                  Write-Error $_
                  exit 1
              }

#------------------------------------------------------------------------------
# STAGE 1.5: Push Settings Catalog Profiles from /profiles_catalog/*.yaml
#------------------------------------------------------------------------------
- stage: pushSettingsCatalogProfiles
  displayName: "Push Settings Catalog Profiles"

  jobs:
    - job: syncSettingsCatalogProfiles
      displayName: "Send Settings Catalog profiles to Intune"
      steps:
        - checkout: self
          fetchDepth: 1  # Only need current commit for profile upload

        - task: PowerShell@2
          displayName: "Detect changed Settings Catalog profiles"
          name: detectCatalogChanges
          inputs:
            targetType: 'inline'
            script: |
              # Detect which Settings Catalog profile files changed - now handles batched commits properly
              
              # Get changed files - improved logic to handle batched commits
              $changedFiles = $null
              $comparisonBase = $null
              
              try {
                  # Method 1: Try to get the last successful build's commit from Azure DevOps API
                  Write-Host "Attempting to find last successful build commit..."
                  $apiUrl = "$(System.TeamFoundationCollectionUri)$(System.TeamProject)/_apis/build/builds?definitions=$(System.DefinitionId)&statusFilter=completed&resultFilter=succeeded&`$top=1&api-version=7.0"
                  
                  try {
                      $headers = @{
                          Authorization = "Bearer $(System.AccessToken)"
                      }
                      $lastSuccessfulBuild = Invoke-RestMethod -Uri $apiUrl -Headers $headers -Method Get
                      
                      if ($lastSuccessfulBuild.count -gt 0 -and $lastSuccessfulBuild.value[0].sourceVersion) {
                          $lastCommit = $lastSuccessfulBuild.value[0].sourceVersion
                          
                          # Check if we have this commit in our shallow clone
                          git cat-file -e $lastCommit 2>$null
                          if ($LASTEXITCODE -eq 0) {
                              $comparisonBase = $lastCommit
                              Write-Host "Found last successful build at commit: $lastCommit"
                              $changedFiles = git diff --name-only $lastCommit HEAD 2>$null
                          }
                          else {
                              Write-Host "Last successful commit $lastCommit not in shallow clone, trying alternative method..."
                          }
                      }
                  }
                  catch {
                      Write-Host "Could not query Azure DevOps API (expected in some scenarios): $_"
                  }
                  
                  # Method 2: If API method didn't work, look at recent commits to catch batched pushes
                  if (-not $changedFiles) {
                      Write-Host "Checking last 10 commits for profile changes (handles batched commits)..."
                      $comparisonBase = "HEAD~10"
                      $changedFiles = git diff --name-only HEAD~10 HEAD 2>$null
                      
                      if ($LASTEXITCODE -ne 0) {
                          # Method 3: Final fallback to HEAD~1 (original behavior)
                          Write-Host "Using fallback: HEAD~1..HEAD"
                          $comparisonBase = "HEAD~1"
                          $changedFiles = git diff --name-only HEAD~1 HEAD 2>$null
                      }
                  }
                  
                  if ($LASTEXITCODE -ne 0) {
                      Write-Host "Git diff failed - processing ALL profiles"
                      Write-Host "##vso[task.setvariable variable=changedCatalogProfiles;isOutput=true]ALL"
                      Write-Host "##vso[task.setvariable variable=hasCatalogChanges;isOutput=true]true"
                      return
                  }
              }
              catch {
                  Write-Host "Could not determine changed files - processing ALL profiles"
                  Write-Host "##vso[task.setvariable variable=changedCatalogProfiles;isOutput=true]ALL"
                  Write-Host "##vso[task.setvariable variable=hasCatalogChanges;isOutput=true]true"
                  return
              }
              
              Write-Host "Comparing against: $comparisonBase"
              Write-Host "Changed files found: $($changedFiles.Count)"
              
              # Filter to only profile YAML files (excluding Apps subdirectory)
              $profileChanges = $changedFiles | Where-Object { 
                  ($_ -like "profiles/*.yaml" -or $_ -like "profiles/**/*.yaml") -and
                  ($_ -notlike "profiles/Apps/*")
              }
              
              if ($profileChanges.Count -eq 0) {
                  Write-Host "No profile changes detected in commit range"
                  Write-Host "##vso[task.setvariable variable=changedCatalogProfiles;isOutput=true]NONE"
                  Write-Host "##vso[task.setvariable variable=hasCatalogChanges;isOutput=true]false"
              }
              else {
                  Write-Host "Changed profile files ($($profileChanges.Count)) - will filter for Settings Catalog:"
                  $profileChanges | ForEach-Object { Write-Host "  - $_" }
                  
                  # Pass the list as semicolon-separated for parsing
                  $profileList = $profileChanges -join ";"
                  Write-Host "##vso[task.setvariable variable=changedCatalogProfiles;isOutput=true]$profileList"
                  Write-Host "##vso[task.setvariable variable=hasCatalogChanges;isOutput=true]true"
              }
          env:
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)

        - task: PowerShell@2
          displayName: "Install required PowerShell modules"
          condition: eq(variables['detectCatalogChanges.hasCatalogChanges'], 'true')
          inputs:
            targetType: 'inline'
            script: |
              Install-Module powershell-yaml -Force -AllowClobber

        # WIF: AzurePowerShell@5 runs Connect-AzAccount as the pipeline managed identity
        # via the IntuneGraphConnection service connection; the bearer token
        # comes from Get-AzAccessToken instead of a client-secret Get-MsalToken.
        - task: AzurePowerShell@5
          displayName: "Push Settings Catalog Profiles"
          condition: eq(variables['detectCatalogChanges.hasCatalogChanges'], 'true')
          inputs:
            azureSubscription: 'IntuneGraphConnection'
            azurePowerShellVersion: 'LatestVersion'
            ScriptType: 'InlineScript'
            Inline: |
              # ===================================================================
              #  SETTINGS CATALOG PROFILES SCRIPT
              #  Deploys Settings Catalog policies via Graph API from YAML
              #  With incremental change detection for efficiency
              # ===================================================================

              $ProfilesCatalogPath = "$(Build.SourcesDirectory)\profiles"
              $ChangedCatalogProfiles = "$(detectCatalogChanges.changedCatalogProfiles)"

              # Exclusion array - Settings Catalog policies to keep even if not in repo
              # Supports exact matches and wildcard patterns (e.g., "Local Admins -*")
              $ExcludeFromDeletion = @(
                  "Default Security Baseline",
                  "Microsoft Edge Security Settings",
                  # All Local Admin policies managed by entra-local-admin-policies-push.yml pipeline
                  "Local Admins -*"
              )

              Import-Module powershell-yaml

              # -------------------------------------------------------------------
              $global:httpClient = $null
              function Get-HttpClient {
                  if (-not $global:httpClient) {
                      $global:httpClient = New-Object System.Net.Http.HttpClient
                  }
                  return $global:httpClient
              }
              function Dispose-HttpClient {
                  if ($global:httpClient) {
                      $global:httpClient.Dispose()
                      $global:httpClient = $null
                  }
              }

              # -------------------------------------------------------------------
              function Get-AccessToken {
                  # AzurePowerShell@5 has already Connect-AzAccount'd as the pipeline managed identity.
                  $token = (Get-AzAccessToken -ResourceUrl "https://graph.microsoft.com").Token
                  # Az.Accounts 5.x returns .Token as a SecureString by default; convert to
                  # plaintext so the bearer header is a valid JWT (else Graph rejects it with
                  # InvalidAuthenticationToken / IDX14102 "cannot decode header").
                  if ($token -is [System.Security.SecureString]) {
                      $token = [System.Net.NetworkCredential]::new('', $token).Password
                  }
                  if (!$token) {
                      throw "Failed to obtain access token."
                  }
                  return $token
              }

              # -------------------------------------------------------------------
              function Do-HttpRequest {
                  param([string]$Method,[string]$Url,[Object]$Body,[string]$Token)
                  $json = $null
                  if ($Body) { $json = $Body | ConvertTo-Json -Depth 20 -Compress }

                  $maxAttempts = 6
                  $attempt = 0
                  while ($true) {
                      $attempt++
                      $msg = New-Object System.Net.Http.HttpRequestMessage($Method, $Url)
                      $msg.Headers.Add("Authorization","Bearer $Token")
                      if ($json) {
                          $msg.Content = New-Object System.Net.Http.StringContent($json,[Text.Encoding]::UTF8,"application/json")
                      }
                      $client = Get-HttpClient
                      $resp = $client.SendAsync($msg).Result
                      $content = $resp.Content.ReadAsStringAsync().Result

                      if ($resp.IsSuccessStatusCode) {
                          if ($Method -ne "GET") { Start-Sleep -Milliseconds 150 }
                          if ($content) {
                              try { return $content | ConvertFrom-Json }
                              catch { return $content }
                          }
                          return $null
                      }

                      $status = [int]$resp.StatusCode
                      $isRetryable = ($status -eq 429 -or $status -eq 503 -or $status -eq 504)
                      if (-not $isRetryable -or $attempt -ge $maxAttempts) {
                          throw "HTTP $($resp.StatusCode) $($resp.ReasonPhrase): $content"
                      }

                      $waitSec = 0
                      if ($resp.Headers.RetryAfter -and $resp.Headers.RetryAfter.Delta) {
                          $waitSec = [int]$resp.Headers.RetryAfter.Delta.TotalSeconds
                      }
                      if ($waitSec -le 0) {
                          $waitSec = [int][Math]::Min(60, [Math]::Pow(2, $attempt) + (Get-Random -Minimum 0 -Maximum 3))
                      }
                      Write-Warning "HTTP $status throttled on $Method $Url (attempt $attempt/$maxAttempts) - waiting ${waitSec}s"
                      Start-Sleep -Seconds $waitSec
                  }
              }

              # -------------------------------------------------------------------
              function Get-AllSettingsCatalogPolicies {
                  param([string]$AccessToken)
                  $baseUrl = "https://graph.microsoft.com/beta/deviceManagement/configurationPolicies"
                  $all = @()
                  $next = $baseUrl
                  while ($next) {
                      $resp = Do-HttpRequest -Method "GET" -Url $next -Token $AccessToken
                      $items = $resp.value
                      if ($items) { $all += $items }
                      $next = $resp.'@odata.nextLink'
                  }
                  # configurationPolicies endpoint only returns Settings Catalog policies
                  # No need to filter by @odata.type as it's not included in list responses
                  return $all
              }

              # -------------------------------------------------------------------
              function Load-YamlCatalogProfiles {
                  param([string]$Dir)
                  if (-not (Test-Path $Dir)) { 
                      Write-Host "Settings Catalog profiles directory not found: $Dir"
                      return @() 
                  }
                  $out = @()
                  Get-ChildItem -Path $Dir -Recurse -Include *.yaml | ForEach-Object {
                      try {
                          $y = Get-Content -Raw -LiteralPath $_.FullName | ConvertFrom-Yaml
                          if ($y.displayName -and $y.settingsCatalog) { 
                              $out += [pscustomobject]@{ 
                                  file = $_.FullName
                                  data = $y 
                              } 
                          }
                      } 
                      catch {
                          Write-Warning "Skipping invalid YAML file: $($_.FullName) => $_"
                      }
                  }
                  $out
              }

              # -------------------------------------------------------------------
              function Get-RepoCatalogProfileNames {
                  param([string]$ProfilesDir)
                  if (-not (Test-Path $ProfilesDir)) {
                      return @()
                  }
                  $items = Get-ChildItem -Path $ProfilesDir -Recurse -Include '*.yaml'
                  $names = @()
                  foreach ($item in $items) {
                      try {
                          $yaml = Get-Content -Raw $item.FullName | ConvertFrom-Yaml
                          # Only include profiles that have settingsCatalog (not omaSettings)
                          if ($yaml -and $yaml.displayName -and $yaml.settingsCatalog) {
                              $names += $yaml.displayName
                          }
                      }
                      catch {}
                  }
                  return $names
              }

              # -------------------------------------------------------------------
              # Sync-hash helpers (also defined in Stage 1; each PowerShell@2 task has
              # its own scope so they must be redefined here). See Stage 1 for rationale:
              # blind DELETE+RECREATE of Settings Catalog policies resets every
              # user/device evaluation, which strands the expired-cert / Entra-registered
              # cohort in "pending" forever.
              $script:CimianSyncHashTag = 'cimian-sync-hash'

              function Get-StableJson {
                  param([Parameter(Mandatory)] $InputObject)
                  $normalize = {
                      param($v)
                      if ($null -eq $v) { return $null }
                      if ($v -is [System.Collections.IDictionary]) {
                          $sorted = [ordered]@{}
                          foreach ($k in ($v.Keys | Sort-Object)) {
                              $sorted[$k] = & $normalize $v[$k]
                          }
                          return $sorted
                      }
                      if ($v -is [System.Collections.IEnumerable] -and $v -isnot [string]) {
                          return @($v | ForEach-Object { & $normalize $_ })
                      }
                      if ($v -is [psobject] -and $v.PSObject.Properties.Count -gt 0) {
                          $sorted = [ordered]@{}
                          foreach ($p in ($v.PSObject.Properties.Name | Sort-Object)) {
                              $sorted[$p] = & $normalize $v.$p
                          }
                          return $sorted
                      }
                      return $v
                  }
                  return ((& $normalize $InputObject) | ConvertTo-Json -Depth 25 -Compress)
              }

              function Get-Sha256Hex {
                  param([Parameter(Mandatory)][string] $Text)
                  $sha = [System.Security.Cryptography.SHA256]::Create()
                  try {
                      $bytes = [System.Text.Encoding]::UTF8.GetBytes($Text)
                      return -join ($sha.ComputeHash($bytes) | ForEach-Object { $_.ToString('x2') })
                  }
                  finally { $sha.Dispose() }
              }

              function Get-CatalogYamlHash {
                  param([psobject] $y)
                  # Hash a normalized view of *what we would push*: displayName + platform
                  # + the converted setting instances. Setting order doesn't affect Intune
                  # behavior, so sort by definitionId for stability.
                  $sortedSettings = @($y.settingsCatalog | Sort-Object -Property { $_.definitionId } | ForEach-Object {
                      [ordered]@{
                          definitionId = [string]$_.definitionId
                          kind         = [string]$_.kind
                          valueType    = [string]$_.valueType
                          value        = if ($null -ne $_.value)    { [string]$_.value }    else { '' }
                          values       = if ($null -ne $_.values)   { @(@($_.values | ForEach-Object { [string]$_ }) | Sort-Object) } else { @() }
                          children     = if ($null -ne $_.children) { $_.children } else { @() }
                      }
                  })
                  $shape = [ordered]@{
                      displayName = [string]$y.displayName
                      platform    = if ($y.platform) { [string]$y.platform } else { 'windows10' }
                      settings    = $sortedSettings
                  }
                  return Get-Sha256Hex (Get-StableJson $shape)
              }

              function Get-DescriptionWithoutHashMarker {
                  param([string] $Description)
                  if (-not $Description) { return '' }
                  $pattern = '(?ms)\s*\[' + [regex]::Escape($script:CimianSyncHashTag) + ':[0-9a-fA-F]+\]\s*$'
                  return ([regex]::Replace($Description, $pattern, '')).TrimEnd()
              }

              function Extract-SyncHash {
                  param([string] $Description)
                  if (-not $Description) { return $null }
                  $m = [regex]::Match($Description, '\[' + [regex]::Escape($script:CimianSyncHashTag) + ':([0-9a-fA-F]+)\]')
                  if ($m.Success) { return $m.Groups[1].Value.ToLower() }
                  return $null
              }

              function Add-SyncHashToDescription {
                  param([string] $Description, [string] $Hash)
                  $base = Get-DescriptionWithoutHashMarker $Description
                  $marker = "[$($script:CimianSyncHashTag):$Hash]"
                  if (-not $base) { return $marker }
                  return "$base`n$marker"
              }

              # -------------------------------------------------------------------
              function New-PolicyBody {
                  param([psobject]$y, [switch]$ForPatch, [array]$settings, [string]$SyncHash)
                  $hash = [char]35  # ASCII code for #
                  $baseDesc = if ($y.description) { [string]$y.description } else { "" }
                  $desc = if ($SyncHash) { Add-SyncHashToDescription -Description $baseDesc -Hash $SyncHash } else { $baseDesc }
                  if ($ForPatch) {
                      # For PATCH operations, only include allowed fields: Name, Description
                      @{
                          name        = $y.displayName
                          description = $desc
                      }
                  } else {
                      # For POST operations, include all fields including settings
                      $body = @{
                          '@odata.type'    = "${hash}microsoft.graph.deviceManagementConfigurationPolicy"
                          name             = $y.displayName
                          description      = $desc
                          platforms        = if ($y.platform) { $y.platform } else { "windows10" }
                          technologies     = "mdm"
                          roleScopeTagIds  = @($y.roleScopeTagIds | ForEach-Object { "$_" })
                      }
                      # Settings must be included in POST body for creation
                      if ($settings) {
                          $body["settings"] = $settings
                      }
                      $body
                  }
              }

              # -------------------------------------------------------------------
              function New-SimpleSettingInstance {
                  param([string]$definitionId,[string]$valueType,$value)
                  $valueType = $valueType.ToLower()
                  $hash = [char]35  # ASCII code for #
                  $vt = switch ($valueType) {
                      "boolean" { "${hash}microsoft.graph.deviceManagementConfigurationBooleanSettingValue" }
                      "integer" { "${hash}microsoft.graph.deviceManagementConfigurationIntegerSettingValue" }
                      default   { "${hash}microsoft.graph.deviceManagementConfigurationStringSettingValue" }
                  }
                  $typedValue = switch ($valueType) {
                      "boolean" { [bool]$value }
                      "integer" { [int]$value }
                      default   { [string]$value }
                  }
                  @{
                      '@odata.type' = "${hash}microsoft.graph.deviceManagementConfigurationSetting"
                      settingInstance = @{
                          '@odata.type'        = "${hash}microsoft.graph.deviceManagementConfigurationSimpleSettingInstance"
                          settingDefinitionId  = $definitionId
                          simpleSettingValue   = @{
                              '@odata.type' = $vt
                              value         = $typedValue
                          }
                      }
                  }
              }

              # -------------------------------------------------------------------
              function New-ChoiceSettingInstance {
                  param([string]$definitionId,[string]$value)
                  $hash = [char]35
                  @{
                      '@odata.type' = "${hash}microsoft.graph.deviceManagementConfigurationSetting"
                      settingInstance = @{
                          '@odata.type'        = "${hash}microsoft.graph.deviceManagementConfigurationChoiceSettingInstance"
                          settingDefinitionId  = $definitionId
                          choiceSettingValue   = @{
                              '@odata.type' = "${hash}microsoft.graph.deviceManagementConfigurationChoiceSettingValue"
                              value         = $value
                              children      = @()
                          }
                      }
                  }
              }

              # -------------------------------------------------------------------
              # Creates a ChoiceSettingInstance with child settings in the children array
              function New-ChoiceWithChildrenInstance {
                  param([string]$definitionId,[string]$value,[array]$children)
                  $hash = [char]35
                  $childInstances = @()
                  foreach ($child in $children) {
                      $childInstances += New-ChildSettingInstance -child $child
                  }
                  @{
                      '@odata.type' = "${hash}microsoft.graph.deviceManagementConfigurationSetting"
                      settingInstance = @{
                          '@odata.type'        = "${hash}microsoft.graph.deviceManagementConfigurationChoiceSettingInstance"
                          settingDefinitionId  = $definitionId
                          choiceSettingValue   = @{
                              '@odata.type' = "${hash}microsoft.graph.deviceManagementConfigurationChoiceSettingValue"
                              value         = $value
                              children      = $childInstances
                          }
                      }
                  }
              }

              # -------------------------------------------------------------------
              function New-CollectionSettingInstance {
                  param([string]$definitionId,[string]$valueType,[array]$values)
                  $valueType = $valueType.ToLower()
                  $hash = [char]35
                  $vt = switch ($valueType) {
                      "boolean" { "${hash}microsoft.graph.deviceManagementConfigurationBooleanSettingValue" }
                      "integer" { "${hash}microsoft.graph.deviceManagementConfigurationIntegerSettingValue" }
                      default   { "${hash}microsoft.graph.deviceManagementConfigurationStringSettingValue" }
                  }
                  $collectionItems = @()
                  foreach ($val in $values) {
                      $typedValue = switch ($valueType) {
                          "boolean" { [bool]$val }
                          "integer" { [int]$val }
                          default   { [string]$val }
                      }
                      $collectionItems += @{
                          '@odata.type' = $vt
                          value         = $typedValue
                      }
                  }
                  @{
                      '@odata.type' = "${hash}microsoft.graph.deviceManagementConfigurationSetting"
                      settingInstance = @{
                          '@odata.type'                 = "${hash}microsoft.graph.deviceManagementConfigurationSimpleSettingCollectionInstance"
                          settingDefinitionId           = $definitionId
                          simpleSettingCollectionValue  = $collectionItems
                      }
                  }
              }

              # -------------------------------------------------------------------
              # Builds a single child setting instance (used inside groupCollection)
              function New-ChildSettingInstance {
                  param([psobject]$child)
                  $hash = [char]35
                  switch ($child.kind) {
                      "simple" {
                          $valueType = $child.valueType.ToLower()
                          $vt = switch ($valueType) {
                              "boolean" { "${hash}microsoft.graph.deviceManagementConfigurationBooleanSettingValue" }
                              "integer" { "${hash}microsoft.graph.deviceManagementConfigurationIntegerSettingValue" }
                              default   { "${hash}microsoft.graph.deviceManagementConfigurationStringSettingValue" }
                          }
                          $typedValue = switch ($valueType) {
                              "boolean" { [bool]$child.value }
                              "integer" { [int]$child.value }
                              default   { [string]$child.value }
                          }
                          @{
                              '@odata.type'        = "${hash}microsoft.graph.deviceManagementConfigurationSimpleSettingInstance"
                              settingDefinitionId  = $child.definitionId
                              simpleSettingValue   = @{
                                  '@odata.type' = $vt
                                  value         = $typedValue
                              }
                          }
                      }
                      "choice" {
                          @{
                              '@odata.type'        = "${hash}microsoft.graph.deviceManagementConfigurationChoiceSettingInstance"
                              settingDefinitionId  = $child.definitionId
                              choiceSettingValue   = @{
                                  '@odata.type' = "${hash}microsoft.graph.deviceManagementConfigurationChoiceSettingValue"
                                  value         = $child.value
                                  children      = @()
                              }
                          }
                      }
                      "collection" {
                          $collectionItems = @()
                          foreach ($val in $child.value) {
                              $collectionItems += @{
                                  '@odata.type' = "${hash}microsoft.graph.deviceManagementConfigurationStringSettingValue"
                                  value         = [string]$val
                              }
                          }
                          @{
                              '@odata.type'                 = "${hash}microsoft.graph.deviceManagementConfigurationSimpleSettingCollectionInstance"
                              settingDefinitionId           = $child.definitionId
                              simpleSettingCollectionValue  = $collectionItems
                          }
                      }
                      default {
                          throw "Unsupported child setting kind '$($child.kind)' in groupCollection/choiceWithChildren"
                      }
                  }
              }

              # -------------------------------------------------------------------
              # Creates a GroupSettingCollectionInstance for parent/child settings
              function New-GroupSettingCollectionInstance {
                  param([string]$parentDefinitionId,[array]$children)
                  $hash = [char]35
                  $childInstances = @()
                  foreach ($child in $children) {
                      $childInstances += New-ChildSettingInstance -child $child
                  }
                  @{
                      '@odata.type' = "${hash}microsoft.graph.deviceManagementConfigurationSetting"
                      settingInstance = @{
                          '@odata.type'                  = "${hash}microsoft.graph.deviceManagementConfigurationGroupSettingCollectionInstance"
                          settingDefinitionId            = $parentDefinitionId
                          groupSettingCollectionValue    = @(
                              @{
                                  children = $childInstances
                              }
                          )
                      }
                  }
              }

              # -------------------------------------------------------------------
              function Convert-YamlToSettingObjects {
                  param([psobject]$y)
                  $settings = @()
                  foreach ($s in $y.settingsCatalog) {
                      if (-not $s.definitionId) { 
                          throw "definitionId is required. Profile: $($y.displayName)" 
                      }
                      
                      switch ($s.kind) {
                          "simple" {
                              if (-not $s.valueType) { 
                                  throw "valueType is required for simple setting. Profile: $($y.displayName)" 
                              }
                              $settings += New-SimpleSettingInstance -definitionId $s.definitionId -valueType $s.valueType -value $s.value
                          }
                          "choice" {
                              if (-not $s.value) { 
                                  throw "value is required for choice setting. Profile: $($y.displayName)" 
                              }
                              $settings += New-ChoiceSettingInstance -definitionId $s.definitionId -value $s.value
                          }
                          "choiceWithChildren" {
                              if (-not $s.value) { 
                                  throw "value is required for choiceWithChildren setting. Profile: $($y.displayName)" 
                              }
                              if (-not $s.children) { 
                                  throw "children array is required for choiceWithChildren setting. Profile: $($y.displayName)" 
                              }
                              $settings += New-ChoiceWithChildrenInstance -definitionId $s.definitionId -value $s.value -children $s.children
                          }
                          "collection" {
                              if (-not $s.valueType) { 
                                  throw "valueType is required for collection setting. Profile: $($y.displayName)" 
                              }
                              if (-not $s.values) { 
                                  throw "values array is required for collection setting. Profile: $($y.displayName)" 
                              }
                              $settings += New-CollectionSettingInstance -definitionId $s.definitionId -valueType $s.valueType -values $s.values
                          }
                          "groupCollection" {
                              if (-not $s.children) { 
                                  throw "children array is required for groupCollection setting. Profile: $($y.displayName)" 
                              }
                              $settings += New-GroupSettingCollectionInstance -parentDefinitionId $s.definitionId -children $s.children
                          }
                          default {
                              throw "Unsupported setting kind '$($s.kind)'. Profile: $($y.displayName). Supported kinds: simple, choice, choiceWithChildren, collection, groupCollection"
                          }
                      }
                  }
                  $settings
              }

              # -------------------------------------------------------------------
              function Get-PolicyByName {
                  param([string]$name,[string]$token)
                  $safeName = $name.Replace("'","''")
                  $url = "https://graph.microsoft.com/beta/deviceManagement/configurationPolicies?`$filter=name eq '$safeName'"
                  $result = Do-HttpRequest -Method GET -Url $url -Token $token
                  return $result.value | Select-Object -First 1
              }

              # -------------------------------------------------------------------
              function Create-Policy {
                  param([hashtable]$body,[string]$token)
                  Do-HttpRequest -Method POST -Url "https://graph.microsoft.com/beta/deviceManagement/configurationPolicies" -Body $body -Token $token
              }

              # -------------------------------------------------------------------
              function Patch-Policy {
                  param([string]$id,[hashtable]$body,[string]$token)
                  Do-HttpRequest -Method PATCH -Url "https://graph.microsoft.com/beta/deviceManagement/configurationPolicies/$id" -Body $body -Token $token
              }

              # -------------------------------------------------------------------
              function Get-PolicySettings {
                  param([string]$id,[string]$token)
                  $url = "https://graph.microsoft.com/beta/deviceManagement/configurationPolicies/$id/settings"
                  $result = Do-HttpRequest -Method GET -Url $url -Token $token
                  return $result.value
              }

              # -------------------------------------------------------------------
              function Delete-PolicySetting {
                  param([string]$policyId,[string]$settingId,[string]$token)
                  $url = "https://graph.microsoft.com/beta/deviceManagement/configurationPolicies/$policyId/settings/$settingId"
                  Do-HttpRequest -Method DELETE -Url $url -Token $token | Out-Null
              }

              # -------------------------------------------------------------------
              function Post-PolicySetting {
                  param([string]$policyId,[object]$settingBody,[string]$token)
                  $url = "https://graph.microsoft.com/beta/deviceManagement/configurationPolicies/$policyId/settings"
                  Do-HttpRequest -Method POST -Url $url -Body $settingBody -Token $token
              }

              # -------------------------------------------------------------------
              function Delete-SettingsCatalogPolicy {
                  param([string]$policyId,[string]$policyName,[string]$token)
                  $url = "https://graph.microsoft.com/beta/deviceManagement/configurationPolicies/$policyId"
                  try {
                      Do-HttpRequest -Method DELETE -Url $url -Token $token
                      Write-Host "Deleted Settings Catalog policy: $policyName"
                  }
                  catch {
                      Write-Warning "Failed to delete Settings Catalog policy '$policyName': $($_.Exception.Message)"
                  }
              }

              # -------------------------------------------------------------------
              function Remove-DuplicateSettingsCatalogPolicies {
                  param([array]$Policies,[string]$AccessToken)
                  $groupedPolicies = $Policies | Group-Object name
                  foreach ($group in $groupedPolicies) {
                      if ($group.Count -gt 1) {
                          Write-Host "Found $($group.Count) duplicate Settings Catalog policies named '$($group.Name)'"
                          # Keep the newest one, delete the rest
                          $sorted = $group.Group | Sort-Object lastModifiedDateTime -Descending
                          $keep = $sorted[0]
                          $toDelete = $sorted[1..($sorted.Count-1)]
                          Write-Host "  Keeping: $($keep.name) (modified $($keep.lastModifiedDateTime), id: $($keep.id))"
                          foreach ($policy in $toDelete) {
                              Write-Host "  Deleting duplicate: $($policy.name) (modified $($policy.lastModifiedDateTime), id: $($policy.id))"
                              Delete-SettingsCatalogPolicy -policyId $policy.id -policyName $policy.name -token $AccessToken
                          }
                      }
                  }
              }

              # -------------------------------------------------------------------
              # MAIN
              # -------------------------------------------------------------------
              try {
                  Write-Host "Processing Settings Catalog profiles..."

                  $token = Get-AccessToken
                  $existingPolicies = Get-AllSettingsCatalogPolicies -AccessToken $token
                  Write-Host "Found $($existingPolicies.Count) existing Settings Catalog policies in Intune."

                  # Clean up duplicate policies first (keeps newest, deletes older duplicates)
                  if ($existingPolicies.Count -gt 0) {
                      Remove-DuplicateSettingsCatalogPolicies -Policies $existingPolicies -AccessToken $token
                      # Refresh the list after cleanup
                      $existingPolicies = Get-AllSettingsCatalogPolicies -AccessToken $token
                      Write-Host "After duplicate cleanup: $($existingPolicies.Count) Settings Catalog policies."
                  }

                  $profiles = Load-YamlCatalogProfiles -Dir $ProfilesCatalogPath
                  if (-not $profiles -or $profiles.Count -eq 0) { 
                      Write-Host "No Settings Catalog YAML profiles found in: $ProfilesCatalogPath"
                      
                      # Still check for policies to delete
                      $repoCatalogProfileNames = @()
                      $toDelete = @()
                      foreach ($policy in $existingPolicies) {
                          $displayName = $policy.name
                          # Check if policy should be excluded (exact match or wildcard pattern)
                          $shouldExclude = $false
                          foreach ($pattern in $ExcludeFromDeletion) {
                              if ($pattern -like "*``**") {
                                  # Wildcard pattern match (e.g., "Local Admins -*")
                                  if ($displayName -like $pattern) {
                                      $shouldExclude = $true
                                      break
                                  }
                              } else {
                                  # Exact match
                                  if ($displayName -eq $pattern) {
                                      $shouldExclude = $true
                                      break
                                  }
                              }
                          }
                          if ($repoCatalogProfileNames -notcontains $displayName -and -not $shouldExclude) {
                              $toDelete += $policy
                          }
                      }
                      
                      if ($toDelete.Count -gt 0) {
                          Write-Host "`nDeleting $($toDelete.Count) Settings Catalog policies not found in repo:"
                          foreach ($p in $toDelete) {
                              Write-Host "  - $($p.name) (id: $($p.id))"
                              Delete-SettingsCatalogPolicy -policyId $p.id -policyName $p.name -token $token
                          }
                      }
                      
                      Dispose-HttpClient
                      return
                  }

                  Write-Host "Found $($profiles.Count) Settings Catalog YAML profiles to process."

                  # Identify and DELETE Settings Catalog policies not in repo (excluding protected ones)
                  $repoCatalogProfileNames = Get-RepoCatalogProfileNames -ProfilesDir $ProfilesCatalogPath
                  $toDelete = @()
                  foreach ($policy in $existingPolicies) {
                      $displayName = $policy.name
                      # Check if policy should be excluded (exact match or wildcard pattern)
                      $shouldExclude = $false
                      foreach ($pattern in $ExcludeFromDeletion) {
                          if ($pattern -like "*``**") {
                              # Wildcard pattern match (e.g., "Local Admins -*")
                              if ($displayName -like $pattern) {
                                  $shouldExclude = $true
                                  break
                              }
                          } else {
                              # Exact match
                              if ($displayName -eq $pattern) {
                                  $shouldExclude = $true
                                  break
                              }
                          }
                      }
                      if ($repoCatalogProfileNames -notcontains $displayName -and -not $shouldExclude) {
                          $toDelete += $policy
                      }
                  }
                  
                  if ($toDelete.Count -gt 0) {
                      Write-Host "`nDeleting $($toDelete.Count) Settings Catalog policies not found in repo:"
                      foreach ($p in $toDelete) {
                          Write-Host "  - $($p.name) (id: $($p.id))"
                          Delete-SettingsCatalogPolicy -policyId $p.id -policyName $p.name -token $token
                      }
                  }
                  else {
                      Write-Host "No Settings Catalog policies to delete."
                  }

                  # Build list of changed profile file names for filtering
                  $changedFileNames = @()
                  $processAll = $false
                  if ($ChangedCatalogProfiles -eq "ALL") {
                      Write-Host "`nProcessing ALL Settings Catalog profiles (full sync mode)"
                      $processAll = $true
                  }
                  else {
                      $changedPaths = $ChangedCatalogProfiles -split ";"
                      foreach ($path in $changedPaths) {
                          if ($path) {
                              $changedFileNames += [System.IO.Path]::GetFileName($path)
                          }
                      }
                      Write-Host "`nIncremental mode - only processing changed files: $($changedFileNames -join ', ')"
                  }

                  # Process each Settings Catalog profile (filtered by change detection)
                  $processedCount = 0
                  $skippedCount = 0
                  foreach ($p in $profiles) {
                      $fileName = [System.IO.Path]::GetFileName($p.file)
                      
                      # Skip if not in changed files list (unless doing full sync)
                      if (-not $processAll -and $changedFileNames -notcontains $fileName) {
                          $skippedCount++
                          continue
                      }
                      
                      $processedCount++
                      $y = $p.data
                      Write-Host "`n=== Processing Settings Catalog: $($y.displayName) ==="
                      
                      try {
                          $existing = Get-PolicyByName -name $y.displayName -token $token
                          $settings = Convert-YamlToSettingObjects -y $y
                          $localHash = Get-CatalogYamlHash -y $y

                          if ($existing) {
                              $remoteHash = Extract-SyncHash -Description ([string]$existing.description)
                              if ($remoteHash -and $remoteHash -eq $localHash) {
                                  Write-Host "Skipping DELETE+RECREATE (no change): $($y.displayName) [hash=$localHash]"
                              }
                              else {
                                  # Settings Catalog policies cannot have settings updated via API
                                  # The only way to update is DELETE entire policy and RECREATE
                                  # This will temporarily remove the policy but assignments by name will reconnect
                                  Write-Host "Policy exists (id: $($existing.id)) - deleting and recreating to update settings..."

                                  Delete-SettingsCatalogPolicy -policyId $existing.id -policyName $y.displayName -token $token

                                  # Small delay to ensure deletion is processed
                                  Start-Sleep -Milliseconds 500

                                  # Create new policy with same name - settings MUST be included in POST body
                                  $base = New-PolicyBody -y $y -settings $settings -SyncHash $localHash
                                  $created = Create-Policy -body $base -token $token

                                  Write-Host "Recreated Settings Catalog policy: $($y.displayName) (new id: $($created.id)) [hash=$localHash]"
                              }
                          }
                          else {
                              # Create new policy - settings MUST be included in the POST body
                              $base = New-PolicyBody -y $y -settings $settings -SyncHash $localHash
                              $created = Create-Policy -body $base -token $token

                              Write-Host "Created Settings Catalog policy: $($y.displayName) (id: $($created.id)) [hash=$localHash]"
                          }
                      }
                      catch {
                          Write-Warning "Failed to process Settings Catalog profile '$($y.displayName)': $($_.Exception.Message)"
                          Write-Warning "Continuing with next profile..."
                      }

                      # Re-fetch so we have updated policies for newly created ones
                      $existingPolicies = Get-AllSettingsCatalogPolicies -AccessToken $token
                  }
                  
                  Write-Host "`nProcessed $processedCount profiles, skipped $skippedCount unchanged profiles."

                  Write-Host "`nSettings Catalog processing complete."
                  Dispose-HttpClient
              }
              catch {
                  Dispose-HttpClient
                  Write-Error $_
                  exit 1
              }

#------------------------------------------------------------------------------
# STAGE 1.5: Push Windows Update Profiles from YAMLs with windowsUpdate.type
#
# Routes YAMLs by `windowsUpdate.type` discriminator to the correct Graph
# endpoint:
#   updateRing            → /deviceManagement/deviceConfigurations
#                           (windowsUpdateForBusinessConfiguration)
#   featureUpdateProfile  → /deviceManagement/windowsFeatureUpdateProfiles
#   hotpatchPolicy        → /deviceManagement/windowsQualityUpdatePolicies
#
# Expedited (`windowsQualityUpdateProfiles`) is NOT handled here — that's the
# manual-trigger pipeline cimian-intune-windowspatch.yml. Assignments are
# applied later by manageAssignments (Update Rings ride the existing
# deviceConfigurations path; the other two have dedicated assign endpoints).
#------------------------------------------------------------------------------
- stage: pushWindowsUpdateProfiles
  displayName: "Push Windows Update Profiles"

  jobs:
    - job: syncWindowsUpdateProfiles
      displayName: "Send Windows Update profiles to Intune"
      steps:
        - checkout: self
          fetchDepth: 1

        - task: PowerShell@2
          displayName: "Install required PowerShell modules"
          inputs:
            targetType: 'inline'
            script: |
              Install-Module powershell-yaml -Force -AllowClobber

        # WIF: AzurePowerShell@5 runs Connect-AzAccount as the pipeline managed identity
        # via the IntuneGraphConnection service connection; the Graph token
        # comes from Get-AzAccessToken instead of a client-secret Get-MsalToken.
        - task: AzurePowerShell@5
          displayName: "Push Windows Update Profiles"
          inputs:
            azureSubscription: 'IntuneGraphConnection'
            azurePowerShellVersion: 'LatestVersion'
            ScriptType: 'InlineScript'
            Inline: |
              $ErrorActionPreference = 'Stop'
              $ProfilesPath  = "$(Build.SourcesDirectory)\profiles"

              Import-Module powershell-yaml

              # Az.Accounts 5.x returns .Token as a SecureString by default; request it
              # explicitly and convert back to plaintext for the Bearer header.
              $secure = (Get-AzAccessToken -ResourceUrl 'https://graph.microsoft.com' -AsSecureString).Token
              $accessToken = [System.Net.NetworkCredential]::new('', $secure).Password
              $headers = @{ Authorization = "Bearer $accessToken"; 'Content-Type' = 'application/json' }

              function Invoke-Graph([string]$Method, [string]$Url, $Body=$null) {
                  $params = @{ Method = $Method; Uri = $Url; Headers = $headers }
                  if ($Body) { $params.Body = ($Body | ConvertTo-Json -Depth 20) }
                  return Invoke-RestMethod @params
              }

              # ----- Collect all YAMLs with a windowsUpdate.type discriminator -----
              $files = Get-ChildItem -Path $ProfilesPath -Recurse -Filter *.yaml -File
              $profiles = @()
              foreach ($f in $files) {
                  try {
                      $y = ConvertFrom-Yaml -Yaml (Get-Content -Raw $f.FullName)
                  } catch { continue }
                  if (-not $y) { continue }
                  if (-not $y.displayName) { continue }
                  if (-not $y.windowsUpdate) { continue }
                  if (-not $y.windowsUpdate.type) { continue }
                  $profiles += [pscustomobject]@{ File = $f.FullName; Y = $y }
              }
              Write-Host "Found $($profiles.Count) Windows Update YAML(s) to sync."

              # ----- Helpers per endpoint type -----
              function Upsert-UpdateRing($y) {
                  # windowsUpdateForBusinessConfiguration is on /deviceConfigurations
                  $base = "https://graph.microsoft.com/v1.0/deviceManagement/deviceConfigurations"
                  $listUrl = "$base`?`$filter=isof('microsoft.graph.windowsUpdateForBusinessConfiguration')"
                  $existing = (Invoke-Graph GET $listUrl).value | Where-Object { $_.displayName -eq $y.displayName }
                  $u = $y.windowsUpdate
                  $body = @{
                      '@odata.type'                          = '#microsoft.graph.windowsUpdateForBusinessConfiguration'
                      displayName                            = $y.displayName
                      description                            = $y.description
                      automaticUpdateMode                    = $u.automaticUpdateMode
                      microsoftUpdateServiceAllowed          = $u.microsoftUpdateServiceAllowed
                      driversExcluded                        = $u.driversExcluded
                      qualityUpdatesDeferralPeriodInDays     = $u.qualityUpdatesDeferralPeriodInDays
                      featureUpdatesDeferralPeriodInDays     = $u.featureUpdatesDeferralPeriodInDays
                      businessReadyUpdatesOnly               = $u.businessReadyUpdatesOnly
                      updateWeeks                            = $u.updateWeeks
                      featureUpdatesRollbackWindowInDays     = $u.featureUpdatesRollbackWindowInDays
                      userPauseAccess                        = $u.userPauseAccess
                      userWindowsUpdateScanAccess            = $u.userWindowsUpdateScanAccess
                      updateNotificationLevel                = $u.updateNotificationLevel
                      allowWindows11Upgrade                  = $u.allowWindows11Upgrade
                      deliveryOptimizationMode               = $u.deliveryOptimizationMode
                      prereleaseFeatures                     = $u.prereleaseFeatures
                      skipChecksBeforeRestart                = $u.skipChecksBeforeRestart
                  }
                  # Rings without auto-install (e.g. notifyDownload) have no schedule
                  if ($u.installationSchedule) {
                      $body.installationSchedule = @{
                          '@odata.type'         = '#microsoft.graph.windowsUpdateScheduledInstall'
                          scheduledInstallDay   = $u.installationSchedule.scheduledInstallDay
                          scheduledInstallTime  = $u.installationSchedule.scheduledInstallTime
                      }
                  }
                  if ($existing) {
                      Invoke-Graph PATCH "$base/$($existing.id)" $body | Out-Null
                      Write-Host "Updated Update Ring '$($y.displayName)' ($($existing.id))"
                  } else {
                      $r = Invoke-Graph POST $base $body
                      Write-Host "Created Update Ring '$($y.displayName)' ($($r.id))"
                  }
              }

              function Upsert-FeatureUpdateProfile($y) {
                  $base = "https://graph.microsoft.com/beta/deviceManagement/windowsFeatureUpdateProfiles"
                  $existing = (Invoke-Graph GET $base).value | Where-Object { $_.displayName -eq $y.displayName }
                  $u = $y.windowsUpdate
                  # rolloutSettings: copy from YAML when populated (peak-season
                  # windowed rollout), otherwise send the empty offer-immediately
                  # shape. Graph rejects unknown keys so we pass only the three
                  # canonical fields.
                  $rollout = @{}
                  if ($u.rolloutSettings) {
                      foreach ($k in 'offerStartDateTimeInUTC','offerEndDateTimeInUTC','offerIntervalInDays') {
                          if ($null -ne $u.rolloutSettings[$k]) { $rollout[$k] = $u.rolloutSettings[$k] }
                      }
                  }
                  $body = @{
                      displayName                                       = $y.displayName
                      description                                       = $y.description
                      featureUpdateVersion                              = $u.featureUpdateVersion
                      installLatestWindows10OnWindows11IneligibleDevice = $u.installLatestWindows10OnWindows11IneligibleDevice
                      installFeatureUpdatesOptional                     = $u.installFeatureUpdatesOptional
                      rolloutSettings                                   = $rollout
                  }
                  if ($existing) {
                      Invoke-Graph PATCH "$base/$($existing.id)" $body | Out-Null
                      Write-Host "Updated Feature Update Profile '$($y.displayName)' ($($existing.id))"
                  } else {
                      $r = Invoke-Graph POST $base $body
                      Write-Host "Created Feature Update Profile '$($y.displayName)' ($($r.id))"
                  }
              }

              function Upsert-HotpatchPolicy($y) {
                  $base = "https://graph.microsoft.com/beta/deviceManagement/windowsQualityUpdatePolicies"
                  $existing = (Invoke-Graph GET $base).value | Where-Object { $_.displayName -eq $y.displayName }
                  $u = $y.windowsUpdate
                  $body = @{
                      displayName     = $y.displayName
                      description     = $y.description
                      hotpatchEnabled = $u.hotpatchEnabled
                  }
                  if ($existing) {
                      Invoke-Graph PATCH "$base/$($existing.id)" $body | Out-Null
                      Write-Host "Updated Hotpatch Policy '$($y.displayName)' ($($existing.id))"
                  } else {
                      $r = Invoke-Graph POST $base $body
                      Write-Host "Created Hotpatch Policy '$($y.displayName)' ($($r.id))"
                  }
              }

              # ----- Dispatch -----
              foreach ($p in $profiles) {
                  $t = $p.Y.windowsUpdate.type
                  try {
                      switch ($t) {
                          'updateRing'           { Upsert-UpdateRing           $p.Y }
                          'featureUpdateProfile' { Upsert-FeatureUpdateProfile $p.Y }
                          'hotpatchPolicy'       { Upsert-HotpatchPolicy       $p.Y }
                          default { Write-Warning "Unknown windowsUpdate.type '$t' in $($p.File) — skipping" }
                      }
                  } catch {
                      Write-Warning "Failed to push '$($p.Y.displayName)' from $($p.File): $($_.Exception.Message)"
                  }
              }

              Write-Host "Windows Update profile sync complete."

#------------------------------------------------------------------------------
# STAGE 2: Manage Microsoft Store Apps
#------------------------------------------------------------------------------
- stage: manageMicrosoftStoreApps
  displayName: "Manage Microsoft Store Apps"

  jobs:
    - job: syncStoreApps
      displayName: "Sync Microsoft Store Apps to Intune"
      steps:
        - checkout: self
          fetchDepth: 1

        - task: PowerShell@2
          displayName: "Install required PowerShell modules"
          inputs:
            targetType: 'inline'
            script: |
              Install-Module powershell-yaml -Force -AllowClobber

        # WIF: AzurePowerShell@5 runs Connect-AzAccount as the pipeline managed identity
        # via the IntuneGraphConnection service connection; the bearer token
        # comes from Get-AzAccessToken instead of a client-secret Get-MsalToken.
        - task: AzurePowerShell@5
          displayName: "Manage Microsoft Store Apps"
          inputs:
            azureSubscription: 'IntuneGraphConnection'
            azurePowerShellVersion: 'LatestVersion'
            ScriptType: 'InlineScript'
            Inline: |
              # ===================================================================
              #  MICROSOFT STORE APPS MANAGEMENT SCRIPT (WinGet Model)
              #  Creates Microsoft Store apps directly via Graph using WinGet packageIdentifiers
              # ===================================================================

              $ManifestsPath = "$(Build.SourcesDirectory)\deployment\manifests"

              # WinGet app definitions using modern package identifiers
              $WinGetAppMappings = @{
                  "Company Portal" = @{
                      PackageIdentifier = "Microsoft.CompanyPortal"
                      DisplayName       = "Company Portal"
                      Publisher         = "Microsoft Corporation"
                      Description       = "The Company Portal app helps you manage your corporate devices and apps."
                      RunAs             = "system"
                  }
                  "CompanyPortal" = @{
                      PackageIdentifier = "Microsoft.CompanyPortal"
                      DisplayName       = "Company Portal"
                      Publisher         = "Microsoft Corporation"
                      Description       = "The Company Portal app helps you manage your corporate devices and apps."
                      RunAs             = "system"
                  }
                  # Note: TelemetryTV Player package identifier may need verification
                  # Store ID 9P3HF721GPKG might correspond to different WinGet package ID
                  "TelemetryTV Player" = @{
                      PackageIdentifier = "TelemetryTV.TelemetryTVPlayer"
                      DisplayName       = "TelemetryTV Player"
                      Publisher         = "TelemetryTV"
                      Description       = "Digital signage and display management application."
                      RunAs             = "system"
                  }
                  "TelemetryTVPlayer" = @{
                      PackageIdentifier = "TelemetryTV.TelemetryTVPlayer"
                      DisplayName       = "TelemetryTV Player"
                      Publisher         = "TelemetryTV"
                      Description       = "Digital signage and display management application."
                      RunAs             = "system"
                  }
                  # Add more app mappings here as needed
              }

              Import-Module powershell-yaml

              # -------------------------------------------------------------------
              $global:httpClient = $null
              function Get-HttpClient {
                  if (-not $global:httpClient) {
                      $global:httpClient = [System.Net.Http.HttpClient]::new()
                  }
                  $global:httpClient
              }
              function Dispose-HttpClient {
                  if ($global:httpClient) {
                      $global:httpClient.Dispose();
                      $global:httpClient = $null
                  }
              }

              # -------------------------------------------------------------------
              function Get-AccessToken {
                  # AzurePowerShell@5 has already Connect-AzAccount'd as the pipeline managed identity.
                  $token = (Get-AzAccessToken -ResourceUrl "https://graph.microsoft.com").Token
                  # Az.Accounts 5.x returns .Token as a SecureString by default; convert to
                  # plaintext so the bearer header is a valid JWT (else Graph rejects it with
                  # InvalidAuthenticationToken / IDX14102 "cannot decode header").
                  if ($token -is [System.Security.SecureString]) {
                      $token = [System.Net.NetworkCredential]::new('', $token).Password
                  }
                  if (!$token) { throw "Failed to obtain access token." }
                  $token
              }

              # -------------------------------------------------------------------
              function Do-HttpRequest {
                  param([string]$Method,[string]$Url,[Object]$Body,[string]$Token)
                  $json = if ($Body) { $Body | ConvertTo-Json -Depth 12 } else { $null }

                  $maxAttempts = 6
                  $attempt = 0
                  while ($true) {
                      $attempt++
                      $msg = [System.Net.Http.HttpRequestMessage]::new($Method, $Url)
                      $msg.Headers.Add("Authorization","Bearer $Token")
                      if ($json) { $msg.Content = [System.Net.Http.StringContent]::new($json,[Text.Encoding]::UTF8,"application/json") }
                      $client = Get-HttpClient
                      $resp = $client.SendAsync($msg).Result
                      $content = $resp.Content.ReadAsStringAsync().Result

                      if ($resp.IsSuccessStatusCode) {
                          if ($Method -ne "GET") { Start-Sleep -Milliseconds 150 }
                          if ($content) {
                              try { return $content | ConvertFrom-Json }
                              catch { return $content }
                          }
                          return $null
                      }

                      $status = [int]$resp.StatusCode
                      $isRetryable = ($status -eq 429 -or $status -eq 503 -or $status -eq 504)
                      if (-not $isRetryable -or $attempt -ge $maxAttempts) {
                          throw "HTTP $($resp.StatusCode) $($resp.ReasonPhrase): $content"
                      }

                      $waitSec = 0
                      if ($resp.Headers.RetryAfter -and $resp.Headers.RetryAfter.Delta) {
                          $waitSec = [int]$resp.Headers.RetryAfter.Delta.TotalSeconds
                      }
                      if ($waitSec -le 0) {
                          $waitSec = [int][Math]::Min(60, [Math]::Pow(2, $attempt) + (Get-Random -Minimum 0 -Maximum 3))
                      }
                      Write-Warning "HTTP $status throttled on $Method $Url (attempt $attempt/$maxAttempts) - waiting ${waitSec}s"
                      Start-Sleep -Seconds $waitSec
                  }
              }

              # -------------------------------------------------------------------
              function Load-ManifestApps {
                  param([string]$ManifestsDir)
                  if (-not (Test-Path $ManifestsDir)) { @() ; return }
                  $seen = @{}
                  function Process-Manifest([string]$Path,[string]$Root) {
                      if ($seen[$Path]) { return @() }
                      $seen[$Path] = $true
                      $apps = @()
                      try {
                          $yaml = Get-Content -Raw $Path | ConvertFrom-Yaml
                          if ($yaml.managed_apps) { $apps += $yaml.managed_apps }
                          if ($yaml.included_manifests) {
                              foreach ($inc in $yaml.included_manifests) {
                                  $p = Join-Path $Root "$inc.yaml"
                                  if (Test-Path $p) { $apps += Process-Manifest -Path $p -Root $Root }
                              }
                          }
                      } catch {}
                      $apps
                  }
                  $all = @()
                  Get-ChildItem -Path $ManifestsDir -Recurse -Include '*.yaml' | ForEach-Object { $all += Process-Manifest -Path $_.FullName -Root $ManifestsDir }
                  $all | Sort-Object -Unique
              }

              # -------------------------------------------------------------------
              function Get-AllWinGetApps {
                  param([string]$AccessToken)
                  $base = "https://graph.microsoft.com/beta/deviceAppManagement/mobileApps"
                  $all = @()
                  $next = $base
                  while ($next) {
                      $r = Do-HttpRequest -Method GET -Url $next -Token $AccessToken
                      if ($r.value) { $all += $r.value }
                      $next = $r.'@odata.nextLink'
                  }
                  $all | Where-Object { $_.'@odata.type' -eq "#microsoft.graph.winGetApp" }
              }

              # -------------------------------------------------------------------
              function Remove-DuplicateApps {
                  param([array]$Apps,[string]$AccessToken)
                  $groupedApps = $Apps | Group-Object displayName
                  foreach ($group in $groupedApps) {
                      if ($group.Count -gt 1) {
                          Write-Host "Found $($group.Count) duplicate apps named '$($group.Name)'"
                          # Keep the newest one, delete the rest
                          $sorted = $group.Group | Sort-Object createdDateTime -Descending
                          $keep = $sorted[0]
                          $toDelete = $sorted[1..($sorted.Count-1)]
                          Write-Host "  Keeping: $($keep.displayName) (created $($keep.createdDateTime))"
                          foreach ($app in $toDelete) {
                              Write-Host "  Deleting duplicate: $($app.displayName) (created $($app.createdDateTime))"
                              try {
                                  $url = "https://graph.microsoft.com/beta/deviceAppManagement/mobileApps/$($app.id)"
                                  Do-HttpRequest -Method DELETE -Url $url -Token $AccessToken
                                  Write-Host "    Successfully deleted duplicate app"
                              }
                              catch {
                                  Write-Warning "    Failed to delete duplicate app: $($_.Exception.Message)"
                              }
                          }
                      }
                  }
              }

              # -------------------------------------------------------------------
              function New-WinGetAppBody {
                  param([hashtable]$Def)
                  [ordered]@{
                      "@odata.type"      = "#microsoft.graph.winGetApp"
                      displayName        = $Def.DisplayName
                      description        = $Def.Description
                      publisher          = $Def.Publisher
                      packageIdentifier  = $Def.PackageIdentifier
                      installExperience  = @{
                          "@odata.type" = "microsoft.graph.winGetAppInstallExperience"
                          runAsAccount  = $Def.RunAs
                      }
                  }
              }

              # -------------------------------------------------------------------
              function Create-WinGetApp {
                  param([hashtable]$Def,[string]$AccessToken)
                  $body = New-WinGetAppBody -Def $Def
                  Do-HttpRequest -Method POST -Url "https://graph.microsoft.com/beta/deviceAppManagement/mobileApps" -Body $body -Token $AccessToken
              }

              # -------------------------------------------------------------------
              function Get-AppByPidOrName {
                  param([array]$Apps,[string]$PackageId,[string]$Name)
                  # First try to match by package identifier (most reliable)
                  $byPackageId = $Apps | Where-Object { $_.packageIdentifier -eq $PackageId } | Select-Object -First 1
                  if ($byPackageId) {
                      return $byPackageId
                  }
                  # Fallback to display name match
                  $byName = $Apps | Where-Object { $_.displayName -eq $Name } | Select-Object -First 1
                  return $byName
              }

              # -------------------------------------------------------------------
              function Wait-UntilPublished {
                  param([string]$AppId,[string]$AccessToken,[int]$TimeoutSec=30)
                  $stop = (Get-Date).AddSeconds($TimeoutSec)
                  $attempts = 0
                  $sleepInterval = if ($TimeoutSec -le 60) { 5 } else { 10 }  # Shorter intervals for quick checks
                  
                  do {
                      $attempts++
                      try {
                          $app = Do-HttpRequest -Method GET -Url "https://graph.microsoft.com/v1.0/deviceAppManagement/mobileApps/$AppId" -Token $AccessToken
                          if ($TimeoutSec -gt 60) {
                              Write-Host "  Attempt $attempts`: Publishing state = $($app.publishingState)"
                          }
                          if ($app.publishingState -eq "published") { return $true }
                      }
                      catch {
                          if ($TimeoutSec -gt 60) {
                              Write-Warning "  Attempt $attempts`: Error checking publishing state: $($_.Exception.Message)"
                          }
                      }
                      Start-Sleep -Seconds $sleepInterval
                  } while ((Get-Date) -lt $stop)
                  $false
              }

              # -------------------------------------------------------------------
              # MAIN
              # -------------------------------------------------------------------
              try {
                  $token = Get-AccessToken
                  $requiredApps = Load-ManifestApps -ManifestsDir $ManifestsPath
                  if (-not $requiredApps -or $requiredApps.Count -eq 0) { 
                      Write-Host "No apps referenced in manifests."; 
                      Dispose-HttpClient; 
                      return 
                  }

                  Write-Host "Loading required apps from manifests: $($requiredApps -join ', ')"
                  $existing = Get-AllWinGetApps -AccessToken $token
                  Write-Host "Found $($existing.Count) existing WinGet apps in Intune."
                  
                  # Clean up any duplicate apps first
                  if ($existing.Count -gt 0) {
                      Remove-DuplicateApps -Apps $existing -AccessToken $token
                      # Refresh the list after cleanup
                      $existing = Get-AllWinGetApps -AccessToken $token
                      Write-Host "After cleanup: $($existing.Count) WinGet apps in Intune."
                  }
                  
                  foreach ($appName in $requiredApps) {
                      if (-not $WinGetAppMappings.ContainsKey($appName)) { 
                          Write-Warning "No WinGet mapping for '$appName'"; 
                          continue 
                      }
                      $def = $WinGetAppMappings[$appName]
                      $found = Get-AppByPidOrName -Apps $existing -PackageId $def.PackageIdentifier -Name $def.DisplayName
                      if ($found) { 
                          Write-Host "App already exists: $($def.DisplayName) [$($found.id)] - skipping creation"
                          continue 
                      }
                      Write-Host "→ Creating new WinGet app: $($def.DisplayName) with package ID: $($def.PackageIdentifier)"
                      $created = Create-WinGetApp -Def $def -AccessToken $token
                      $id = $created.id
                      Write-Host "Created: $($def.DisplayName) [$id]"
                      
                      # Optional: Quick check if app publishes quickly (max 30 seconds)
                      Write-Host "Checking initial publishing state..."
                      $quickCheck = Wait-UntilPublished -AppId $id -AccessToken $token -TimeoutSec 30
                      if ($quickCheck) { 
                          Write-Host "App published quickly: $($def.DisplayName)"
                      } else {
                          Write-Host "App still processing (normal for WinGet apps). Continuing with pipeline..."
                      }
                      # Refresh the list to include newly created apps
                      $existing = Get-AllWinGetApps -AccessToken $token
                  }

                  Write-Host "Microsoft Store (WinGet) app sync complete."
                  Dispose-HttpClient
              }
              catch {
                  Dispose-HttpClient
                  Write-Error $_
                  exit 1
              }

#------------------------------------------------------------------------------
# STAGE 2.5: Sync Entra group membership for changed manifests
#------------------------------------------------------------------------------
- stage: syncGroupMembership
  displayName: "Sync Group Membership"
  dependsOn: detectManifestChanges
  condition: "eq(dependencies.detectManifestChanges.outputs['detectChanges.setVars.ManifestsChanged'], 'true')"
  variables:
    targetedMode: $[ stageDependencies.detectManifestChanges.detectChanges.outputs['setVars.TargetedMode'] ]
    targetSerials: $[ stageDependencies.detectManifestChanges.detectChanges.outputs['setVars.TargetSerials'] ]
  jobs:
    - job: syncGroups
      displayName: "Ensure devices are in correct Entra groups"
      pool:
        vmImage: 'windows-latest'
      variables:
        targetedMode: $[stageDependencies.detectManifestChanges.detectChanges.outputs['setVars.TargetedMode']]
        targetSerials: $[stageDependencies.detectManifestChanges.detectChanges.outputs['setVars.TargetSerials']]
        changedManifestPaths: $[stageDependencies.detectManifestChanges.detectChanges.outputs['setVars.ChangedManifestPaths']]
      steps:
        - checkout: self
          fetchDepth: 1
          displayName: 'Checkout Repository'
        - script: |
            python -m pip install --upgrade pip
            pip install requests azure-storage-blob azure-identity
          displayName: "Install Python Dependencies"
        # WIF: AzureCLI@2 pre-authenticates `az` as the pipeline managed identity via the
        # IntuneGraphConnection service connection; the inner Python resolves
        # that session through DefaultAzureCredential (Graph + blob storage).
        - task: AzureCLI@2
          displayName: "Targeted Group Membership Sync"
          env:
            CHANGED_MANIFEST_PATHS: $(changedManifestPaths)
            TARGETED_MODE: $(targetedMode)
            TARGET_SERIALS: $(targetSerials)
          inputs:
            azureSubscription: 'IntuneGraphConnection'
            scriptType: pscore
            scriptLocation: inlineScript
            inlineScript: |
              $py = @'
              """
              Entra Group Membership Sync for Cimian (Windows) Manifests
              
              Supports two modes:
                1. Normal mode: triggered by manifest changes, syncs groups using
                   intune.csv from blob storage (existing behavior).
                2. Targeted mode: triggered by targetSerials/targetManifest parameters,
                   reads computers.csv for hierarchy mapping and queries Graph API
                   for fresh object_ids (bypasses stale intune.csv).
              
              Platform filter: Windows only (Cimian is Windows)
              """
              import os
              import csv
              import io
              import logging
              import time
              import requests
              from azure.storage.blob import BlobServiceClient
              from azure.identity import DefaultAzureCredential

              logging.basicConfig(level=logging.INFO, format="%(levelname)-8s | %(message)s")
              log = logging.getLogger(__name__)
              
              GRAPH_BASE = "https://graph.microsoft.com/v1.0"
              GRAPH_BETA = "https://graph.microsoft.com/beta"
              BLOB_ACCOUNT_URL = "https://enrollmentfuncstorage.blob.core.windows.net"
              CONTAINER_NAME = "inventory-enrollment-data"
              BLOB_PATH = "production/intune.csv"
              COMPUTERS_CSV = "deployment/enroll/computers.csv"
              
              # Platform filter for this pipeline (Cimian = Windows only)
              PLATFORM_FILTER = "Windows"
              
              # Top-level usage roots that map to device hierarchy groups
              USAGE_ROOTS = {"Assigned", "Shared"}
              
              # Manifests that don't correspond to device-filterable groups
              SKIP_MANIFESTS = {
                  "CoreManifest", "CoreApps", "CoreDrivers", "ManagementPrefs",
                  "ManagementTools", "ManagedApps", "Upkeep", "Bootstrap",
                  "ProvisioningCurriculum", "ProvisioningFaculty", "ProvisioningKiosk",
                  "ProvisioningStaff", "TestingApps", "Orphaned"
              }
              
              
              class GraphClient:
                  def __init__(self, credential):
                      # AzureCLI@2 has already logged `az` in as the pipeline managed identity;
                      # DefaultAzureCredential resolves that session.
                      token = credential.get_token("https://graph.microsoft.com/.default")
                      if not token or not token.token:
                          raise RuntimeError("Failed to obtain Graph token.")
                      self.token = token.token
                      self.credential = credential
                      log.info("Graph API token acquired.")
              
                  def _headers(self):
                      return {
                          "Authorization": f"Bearer {self.token}",
                          "Content-Type": "application/json"
                      }
              
                  def find_group(self, group_name):
                      safe = group_name.replace("'", "''")
                      url = f"{GRAPH_BASE}/groups?$filter=displayName eq '{safe}'&$select=id,displayName"
                      r = requests.get(url, headers=self._headers())
                      r.raise_for_status()
                      items = r.json().get("value", [])
                      return items[0]["id"] if items else None
              
                  def create_group(self, group_name):
                      body = {
                          "displayName": group_name,
                          "description": "Auto-created by DevOps pipeline for manifest-based device management.",
                          "mailEnabled": False,
                          "mailNickname": group_name.replace("-", "").replace(" ", "")[:64],
                          "securityEnabled": True,
                          "groupTypes": []
                      }
                      r = requests.post(f"{GRAPH_BASE}/groups", headers=self._headers(), json=body)
                      if r.status_code >= 400:
                          log.error("Failed to create group '%s': %s %s", group_name, r.status_code, r.text)
                          return None
                      gid = r.json()["id"]
                      log.info("Created group '%s' (%s)", group_name, gid)
                      return gid
              
                  def get_or_create_group(self, group_name):
                      gid = self.find_group(group_name)
                      if not gid:
                          gid = self.create_group(group_name)
                      return gid
              
                  def get_group_members(self, group_id):
                      members = set()
                      url = f"{GRAPH_BASE}/groups/{group_id}/members?$select=id&$top=999"
                      first_page = True
                      while url:
                          r = requests.get(url, headers=self._headers())
                          # Graph directory can 404 a just-created group for a few
                          # seconds while the read replica catches up. Retry once.
                          if first_page and r.status_code == 404:
                              time.sleep(3)
                              r = requests.get(url, headers=self._headers())
                              if r.status_code == 404:
                                  log.warning("Group %s still 404 after retry; treating as empty.", group_id)
                                  return set()
                          r.raise_for_status()
                          data = r.json()
                          for m in data.get("value", []):
                              members.add(m["id"])
                          url = data.get("@odata.nextLink")
                          first_page = False
                      return members
              
                  def add_member(self, group_id, object_id):
                      body = {
                          "@odata.id": f"{GRAPH_BASE}/directoryObjects/{object_id}"
                      }
                      r = requests.post(
                          f"{GRAPH_BASE}/groups/{group_id}/members/$ref",
                          headers=self._headers(), json=body
                      )
                      if r.status_code == 400 and "already exist" in r.text.lower():
                          return
                      if r.status_code >= 400:
                          log.warning("Failed to add %s to group %s: %s", object_id, group_id, r.text)
              
                  def remove_member(self, group_id, object_id):
                      r = requests.delete(
                          f"{GRAPH_BASE}/groups/{group_id}/members/{object_id}/$ref",
                          headers=self._headers()
                      )
                      if r.status_code >= 400:
                          log.warning("Failed to remove %s from group %s: %s", object_id, group_id, r.text)
              
                  def fetch_device_object_id(self, serial_number):
                      """
                      Query Graph API for a serial number's current Entra object_id.
                      Two-step: managedDevices (by serial) -> devices (by azureADDeviceId).
                      Returns object_id or None.
                      """
                      hdr = {"Authorization": f"Bearer {self.token}"}
                      select = "id,azureADDeviceId,enrolledDateTime,managementState,serialNumber"
              
                      url = (
                          f"{GRAPH_BETA}/deviceManagement/managedDevices"
                          f"?$filter=startsWith(serialNumber,'{serial_number}')"
                          f"&$select={select}&$top=999"
                      )
                      resp = requests.get(url, headers=hdr)
              
                      if resp.status_code == 400:
                          url = f"{GRAPH_BETA}/deviceManagement/managedDevices?$select={select}&$top=999"
                          resp = requests.get(url, headers=hdr)
              
                      if resp.status_code != 200:
                          log.warning("Graph API error fetching device %s: %s", serial_number, resp.status_code)
                          return None
              
                      devices = [
                          d for d in resp.json().get("value", [])
                          if d.get("serialNumber", "").strip().upper() == serial_number.upper()
                      ]
                      if not devices:
                          log.warning("Serial %s not found in Intune managed devices", serial_number)
                          return None
              
                      devices.sort(key=lambda d: d.get("enrolledDateTime", ""), reverse=True)
                      candidate = next(
                          (d for d in devices if d.get("managementState") not in ("retired", "deleted")),
                          devices[0]
                      )
                      azure_device_id = candidate.get("azureADDeviceId")
                      if not azure_device_id:
                          log.warning("Serial %s: no azureADDeviceId on Intune record", serial_number)
                          return None
              
                      url = f"{GRAPH_BASE}/devices?$filter=deviceId eq '{azure_device_id}'&$select=id"
                      resp = requests.get(url, headers=self._headers())
                      if resp.status_code != 200:
                          log.warning("Failed to resolve Entra object for device %s: %s", azure_device_id, resp.status_code)
                          return None
              
                      entra_devices = resp.json().get("value", [])
                      if not entra_devices:
                          log.warning("Serial %s: azureADDeviceId %s not found in Entra", serial_number, azure_device_id)
                          return None
              
                      object_id = entra_devices[0]["id"]
                      log.info("Serial %s -> object_id %s (fresh from Graph API)", serial_number, object_id)
                      return object_id
              
              
              def download_intune_csv(credential):
                  """Download intune.csv from Azure Blob Storage using the MI session."""
                  blob_service = BlobServiceClient(
                      account_url=BLOB_ACCOUNT_URL,
                      credential=credential
                  )
                  blob_client = blob_service.get_blob_client(CONTAINER_NAME, BLOB_PATH)
                  data = blob_client.download_blob().readall().decode("utf-8")
                  log.info("Downloaded intune.csv from blob storage (%d bytes)", len(data))
                  return data
              
              
              def read_computers_csv():
                  """Read the repo's local computers.csv for device-to-hierarchy mapping."""
                  if not os.path.exists(COMPUTERS_CSV):
                      log.error("computers.csv not found at %s", COMPUTERS_CSV)
                      return []
                  with open(COMPUTERS_CSV, "r") as f:
                      reader = csv.DictReader(f)
                      devices = list(reader)
                  log.info("Loaded %d devices from %s", len(devices), COMPUTERS_CSV)
                  return devices
              
              
              def device_row_to_group_name(row):
                  """
                  Convert a computers.csv row to its Entra group name.
                  Uses usage/catalog/area/location fields -> Devices-{usage}-{catalog}-{area}-{location}
                  Drops empty trailing segments.
                  """
                  segments = []
                  for field in ["usage", "catalog", "area", "location"]:
                      val = row.get(field, "").strip().replace(" ", "")
                      if val:
                          segments.append(val)
                      else:
                          break
                  if not segments:
                      return None
                  if segments[0] not in USAGE_ROOTS:
                      return None
                  return "Devices-" + "-".join(segments)
              
              
              def build_waterfall_groups(row):
                  """
                  Build the full waterfall group hierarchy for a device, matching enrollment-intune.
                  Returns list: ["Devices-All", "Devices-{usage}", ..., "Devices-{usage}-{catalog}-{area}-{location}"]
                  """
                  usage = row.get("usage", "").strip().replace(" ", "")
                  catalog = row.get("catalog", "").strip().replace(" ", "")
                  area = row.get("area", "").strip().replace(" ", "")
                  location = row.get("location", "").strip().replace(" ", "")
                  
                  if not usage or usage not in USAGE_ROOTS:
                      return []
                  
                  groups = ["Devices-All", f"Devices-{usage}"]
                  if catalog:
                      groups.append(f"Devices-{usage}-{catalog}")
                  if catalog and area:
                      groups.append(f"Devices-{usage}-{catalog}-{area}")
                  if catalog and area and location:
                      groups.append(f"Devices-{usage}-{catalog}-{area}-{location}")
                  
                  return groups
              
              
              def parse_manifest_path_to_group(manifest_path):
                  """
                  Convert a manifest file path to its Entra group name.
                  e.g. deployment/manifests/Assigned/Staff/IT.yaml -> Devices-Assigned-Staff-IT
                  Returns None if the manifest doesn't map to a device-hierarchy group.
                  """
                  path = manifest_path.replace("\\", "/")
                  if path.startswith("deployment/manifests/"):
                      path = path[len("deployment/manifests/"):]
                  
                  if path.endswith(".yaml"):
                      path = path[:-5]
                  elif path.endswith(".yml"):
                      path = path[:-4]
                  
                  segments = path.split("/")
                  base_name = segments[-1]
                  
                  if base_name in SKIP_MANIFESTS:
                      return None
                  
                  if segments[0] not in USAGE_ROOTS:
                      return None
                  
                  # Cap at 4 segments (usage/catalog/area/location) - skip device-level
                  if len(segments) > 4:
                      segments = segments[:4]
                  
                  return "Devices-" + "-".join(segments)
              
              
              def group_name_to_filter(group_name):
                  """
                  Convert a group name to intune.csv filter criteria.
                  Devices-Assigned-Staff-IT -> {usage: Assigned, catalog: Staff, area: IT}
                  """
                  parts = group_name.split("-")
                  if len(parts) < 2 or parts[0] != "Devices":
                      return None
                  
                  criteria = {}
                  field_map = ["usage", "catalog", "area", "location"]
                  for i, field in enumerate(field_map):
                      idx = i + 1
                      if idx < len(parts):
                          criteria[field] = parts[idx]
                  
                  return criteria
              
              
              def filter_devices(devices, criteria, platform_filter):
                  """Filter devices matching all criteria and platform, with non-empty object_id."""
                  matched = []
                  for dev in devices:
                      if platform_filter and dev.get("platform", "") != platform_filter:
                          continue
                      if not dev.get("object_id"):
                          continue
                      if dev.get("status", "") != "Active":
                          continue
                      
                      match = True
                      for field, value in criteria.items():
                          dev_value = dev.get(field, "").replace(" ", "")
                          if dev_value != value:
                              match = False
                              break
                      if match:
                          matched.append(dev)
                  return matched
              
              
              def run_targeted_serial_sync(graph, target_serials_raw):
                  """
                  Targeted serial sync: for each serial, look up its group from computers.csv
                  and fetch a fresh object_id from Graph API, then add to the correct group.
                  Additive only — does not remove members (full enrollment-intune handles cleanup).
                  """
                  serials = [s.strip() for s in target_serials_raw.split(",") if s.strip()]
                  if not serials:
                      log.info("No target serials provided.")
                      return 0
              
                  computers = read_computers_csv()
                  if not computers:
                      return 1
              
                  serial_lookup = {}
                  for row in computers:
                      serial_lookup[row.get("serial", "").strip().upper()] = row
              
                  total_added = 0
                  for serial in serials:
                      log.info("--- Processing serial: %s ---", serial)
                      row = serial_lookup.get(serial.upper())
                      if not row:
                          log.warning("  Serial %s not found in computers.csv, skipping", serial)
                          continue
              
                      waterfall = build_waterfall_groups(row)
                      if not waterfall:
                          log.warning("  Serial %s: could not derive group hierarchy from row %s", serial, row)
                          continue
              
                      object_id = graph.fetch_device_object_id(serial)
                      if not object_id:
                          log.warning("  Serial %s: could not get fresh object_id from Graph API, skipping", serial)
                          continue
              
                      log.info("  Waterfall groups: %s", waterfall)
                      for group_name in waterfall:
                          group_id = graph.get_or_create_group(group_name)
                          if not group_id:
                              log.error("  Could not find or create group '%s', skipping", group_name)
                              continue
                          graph.add_member(group_id, object_id)
                          log.info("  %s -> added %s to %s (%s)", serial, object_id, group_name, group_id)
              
                      total_added += 1
              
                  log.info("=== Targeted serial sync complete: %d devices processed ===", total_added)
                  return 0
              
              
              def run_targeted_manifest_sync(graph, changed_paths):
                  """
                  Targeted manifest sync: fetches fresh object_ids from Graph API using
                  computers.csv serials. Follows the enrollment-intune waterfall pattern,
                  adding each device to ALL hierarchical groups.
                  """
                  target_groups = {}
                  for path in changed_paths:
                      group_name = parse_manifest_path_to_group(path)
                      if group_name and group_name not in target_groups:
                          criteria = group_name_to_filter(group_name)
                          if criteria:
                              target_groups[group_name] = criteria
                              log.info("  %s -> %s (filter: %s)", path, group_name, criteria)
                      elif not group_name:
                          log.info("  %s -> skipped (non-hierarchy manifest)", path)
              
                  if not target_groups:
                      log.info("No device-hierarchy groups affected.")
                      return 0
              
                  computers = read_computers_csv()
                  if not computers:
                      return 1
              
                  # Collect all unique devices affected by changed manifests
                  seen_serials = set()
                  affected_devices = []
                  for group_name, criteria in sorted(target_groups.items()):
                      log.info("--- Finding devices for group: %s ---", group_name)
                      for dev in computers:
                          if dev.get("platform", "") != PLATFORM_FILTER:
                              continue
                          if dev.get("status", "") != "Active":
                              continue
                          serial = dev.get("serial", "").strip().upper()
                          if serial in seen_serials:
                              continue
                          match = True
                          for field, value in criteria.items():
                              dev_value = dev.get(field, "").replace(" ", "")
                              if dev_value != value:
                                  match = False
                                  break
                          if match:
                              seen_serials.add(serial)
                              affected_devices.append(dev)
              
                  log.info("Found %d unique devices affected by changed manifests", len(affected_devices))
              
                  # Process each device: fetch fresh object_id, add to full waterfall
                  total_added = 0
                  for dev in affected_devices:
                      serial = dev.get("serial", "").strip()
                      if not serial:
                          continue
              
                      waterfall = build_waterfall_groups(dev)
                      if not waterfall:
                          log.warning("  Serial %s: could not derive group hierarchy, skipping", serial)
                          continue
              
                      object_id = graph.fetch_device_object_id(serial)
                      if not object_id:
                          log.warning("  Serial %s: no object_id from Graph, skipping", serial)
                          continue
              
                      log.info("  Serial %s: waterfall groups: %s", serial, waterfall)
                      for group_name in waterfall:
                          group_id = graph.get_or_create_group(group_name)
                          if not group_id:
                              log.error("  Could not find or create group '%s', skipping", group_name)
                              continue
                          graph.add_member(group_id, object_id)
                          log.info("  %s -> added %s to %s", serial, object_id, group_name)
              
                      total_added += 1
              
                  log.info("=== Targeted manifest sync complete: %d devices processed ===", total_added)
                  return 0
              
              
              def run_normal_sync(graph, changed_paths_raw, credential):
                  """Normal sync mode: intune.csv from blob, diff-based membership."""
                  import glob
              
                  if changed_paths_raw == "__ALL__":
                      log.info("Force full run - processing ALL manifests")
                      changed_paths = glob.glob("deployment/manifests/**/*.yaml", recursive=True)
                      changed_paths.extend(glob.glob("deployment/manifests/**/*.yml", recursive=True))
                      log.info("Found %d total manifest files", len(changed_paths))
                  else:
                      changed_paths = [p.strip() for p in changed_paths_raw.split(";") if p.strip()]
                      log.info("Changed manifest paths (%d): %s", len(changed_paths), changed_paths)
              
                  target_groups = {}
                  for path in changed_paths:
                      group_name = parse_manifest_path_to_group(path)
                      if group_name and group_name not in target_groups:
                          criteria = group_name_to_filter(group_name)
                          if criteria:
                              target_groups[group_name] = criteria
                              log.info("  %s -> %s (filter: %s)", path, group_name, criteria)
                          else:
                              log.info("  %s -> %s (no valid filter, skipping)", path, group_name)
                      elif not group_name:
                          log.info("  %s -> skipped (non-hierarchy manifest)", path)
              
                  if not target_groups:
                      log.info("No device-hierarchy groups affected by manifest changes.")
                      return 0
              
                  csv_data = download_intune_csv(credential)
                  reader = csv.DictReader(io.StringIO(csv_data))
                  devices = list(reader)
                  log.info("Loaded %d devices from intune.csv", len(devices))
              
                  total_added = 0
                  total_removed = 0
                  for group_name, criteria in sorted(target_groups.items()):
                      log.info("--- Processing group: %s ---", group_name)
              
                      matched = filter_devices(devices, criteria, PLATFORM_FILTER)
                      desired_ids = {d["object_id"] for d in matched}
                      log.info("  Matched %d %s devices for criteria %s",
                               len(matched), PLATFORM_FILTER, criteria)
              
                      group_id = graph.find_group(group_name)
                      if group_id:
                          current_ids = graph.get_group_members(group_id)
                      else:
                          group_id = graph.create_group(group_name)
                          if not group_id:
                              log.error("  Could not create group '%s', skipping.", group_name)
                              continue
                          # Freshly-created group: skip the /members read to
                          # avoid racing Graph directory replication.
                          current_ids = set()

                      to_add = desired_ids - current_ids
                      to_remove = current_ids - desired_ids
                      all_object_ids = {d["object_id"] for d in devices if d.get("object_id")}
                      to_remove = to_remove & all_object_ids
              
                      for oid in to_add:
                          graph.add_member(group_id, oid)
                      for oid in to_remove:
                          graph.remove_member(group_id, oid)
              
                      total_added += len(to_add)
                      total_removed += len(to_remove)
                      log.info("  %s: +%d added, -%d removed, %d desired total",
                               group_name, len(to_add), len(to_remove), len(desired_ids))
              
                  log.info("=== Group sync complete: %d groups processed, +%d added, -%d removed ===",
                           len(target_groups), total_added, total_removed)
                  return 0
              
              
              def main():
                  changed_paths_raw = os.getenv("CHANGED_MANIFEST_PATHS", "")
                  targeted_mode = os.getenv("TARGETED_MODE", "false").lower() == "true"
                  target_serials = os.getenv("TARGET_SERIALS", "").strip()

                  credential = DefaultAzureCredential()
                  graph = GraphClient(credential)

                  # --- Targeted mode: fresh Graph API lookups ---
                  if targeted_mode and target_serials:
                      log.info("=== TARGETED SERIAL MODE: %s ===", target_serials)
                      return run_targeted_serial_sync(graph, target_serials)

                  if targeted_mode and changed_paths_raw:
                      log.info("=== TARGETED MANIFEST MODE ===")
                      changed_paths = [p.strip() for p in changed_paths_raw.split(";") if p.strip()]
                      return run_targeted_manifest_sync(graph, changed_paths)

                  # --- Normal mode: intune.csv from blob storage ---
                  if not changed_paths_raw:
                      log.info("No changed manifest paths provided. Nothing to do.")
                      return 0

                  return run_normal_sync(graph, changed_paths_raw, credential)

              if __name__ == "__main__":
                  raise SystemExit(main())
              '@
              $scriptFile = Join-Path $env:AGENT_TEMPDIRECTORY 'sync-groups.py'
              Set-Content -Path $scriptFile -Value $py -Encoding utf8
              python $scriptFile

#------------------------------------------------------------------------------
# STAGE 3: Assign to Group(s) from /deployment/manifests
#------------------------------------------------------------------------------
- stage: manageAssignments
  displayName: "Assign Profiles and Apps to Groups"
  dependsOn:
    - pushProfiles
    - pushSettingsCatalogProfiles
    - pushWindowsUpdateProfiles
    - manageMicrosoftStoreApps
    - syncGroupMembership
  condition: |
    and(
      not(failed('pushProfiles')),
      not(failed('pushSettingsCatalogProfiles')),
      not(failed('pushWindowsUpdateProfiles')),
      not(failed('manageMicrosoftStoreApps')),
      not(failed('syncGroupMembership'))
    )

  jobs:
    - job: assignmentMgmt
      displayName: "Apply Group Assignments for Profiles and Apps from deployment/manifests"
      steps:
        - checkout: self
          fetchDepth: 1

        - script: |
            python -m pip install --upgrade pip
            pip install requests pyyaml azure-identity
          displayName: "Install Python dependencies"

        # WIF: AzureCLI@2 pre-authenticates `az` as the pipeline managed identity via the
        # IntuneGraphConnection service connection; the inner Python resolves
        # that session through DefaultAzureCredential.
        - task: AzureCLI@2
          displayName: "Assign Profiles and Apps to Groups"
          env:
            APPLY_MANAGED_EXCLUSIONS: ${{ parameters.applyManagedExclusions }}
          inputs:
            azureSubscription: 'IntuneGraphConnection'
            scriptType: pscore
            scriptLocation: inlineScript
            inlineScript: |
              $py = @'
              import os
              import re
              import glob
              import yaml
              import logging
              import pathlib
              import requests
              from azure.identity import DefaultAzureCredential
              from typing import Optional

              logging.basicConfig(level=logging.INFO)

              MANIFESTS_ROOT = "deployment/manifests"
              GRAPH_BASE     = "https://graph.microsoft.com/v1.0"

              # ───────────────────────────────────────── Graph helper ──────────────────────
              class GraphAPIClient:
                  def __init__(self, credential):
                      self.credential = credential
                      self.token = None
                      self.group_cache = {}
                      self._authenticate()

                  def _authenticate(self):
                      # AzureCLI@2 has already logged `az` in as the pipeline managed identity;
                      # DefaultAzureCredential resolves that session.
                      token = self.credential.get_token("https://graph.microsoft.com/.default")
                      if not token or not token.token:
                          raise ValueError("Failed to obtain Graph token.")
                      self.token = token.token
                      logging.info("Graph API token acquired.")
              
                  def _headers(self):
                      return {
                          "Authorization": f"Bearer {self.token}",
                          "Content-Type":  "application/json"
                      }
              
                  def list_windows_configs(self):
                      url = f"{GRAPH_BASE}/deviceManagement/deviceConfigurations?$top=999"
                      results = []
                      while url:
                          resp = requests.get(url, headers=self._headers())
                          resp.raise_for_status()
                          data = resp.json()
                          results.extend(data.get("value", []))
                          url = data.get("@odata.nextLink")
                      return {p["displayName"]: p
                              for p in results
                              if "windows" in p.get("@odata.type", "").lower()}

                  def list_settings_catalog_policies(self):
                      # configurationPolicies endpoint only returns Settings Catalog policies
                      # No need to filter by @odata.type as it's not included in list responses
                      url = "https://graph.microsoft.com/beta/deviceManagement/configurationPolicies?$top=999"
                      results = []
                      while url:
                          resp = requests.get(url, headers=self._headers())
                          resp.raise_for_status()
                          data = resp.json()
                          results.extend(data.get("value", []))
                          url = data.get("@odata.nextLink")
                      return {p["name"]: p for p in results if p.get("name")}
              
                  def list_win_get_apps(self):
                      # Try beta endpoint first (where WinGet apps are created), then fall back to v1.0
                      endpoints = [
                          "https://graph.microsoft.com/beta/deviceAppManagement/mobileApps",
                          f"{GRAPH_BASE}/deviceAppManagement/mobileApps"
                      ]
                      
                      for endpoint in endpoints:
                          try:
                              url = endpoint
                              results = []
                              while url:
                                  resp = requests.get(url, headers=self._headers())
                                  resp.raise_for_status()
                                  data = resp.json()
                                  results.extend(data.get("value", []))
                                  url = data.get("@odata.nextLink")
                              
                              # Filter for WinGet apps (modern Microsoft Store apps)
                              wg = [a for a in results if a.get("@odata.type") == "#microsoft.graph.winGetApp"]
                              if wg:  # If we found WinGet apps, use this endpoint
                                  logging.info(f"Found {len(wg)} WinGet (Store) apps in Intune (using {endpoint}):")
                                  for app in wg:
                                      logging.info(f"  - {app.get('displayName')} ({app.get('@odata.type')})")
                                  return {a["displayName"]: a for a in wg}
                          except Exception as e:
                              logging.warning(f"Failed to query {endpoint}: {e}")
                              continue
                      
                      logging.info("Found 0 WinGet apps in Intune.")
                      return {}
              
                  def get_group_id(self, group_name):
                      if group_name in self.group_cache:
                          return self.group_cache[group_name]
              
                      safe = group_name.replace("'", "''")
                      url  = f"{GRAPH_BASE}/groups?$filter=displayName eq '{safe}'"
                      resp = requests.get(url, headers=self._headers())
                      resp.raise_for_status()
                      items = resp.json().get("value", [])
              
                      if not items:
                          if group_name == "Devices-ManagementPrefs":
                              logging.warning("Group 'Devices-ManagementPrefs' not found; falling back to 'Devices-All'.")
                              return self.get_group_id("Devices-All")
                          logging.error("Group '%s' not found; skipping.", group_name)
                          return None
              
                      gid = items[0]["id"]
                      self.group_cache[group_name] = gid
                      return gid
              
                  def get_policy_assignments(self, config_id):
                      """Get current (include, exclude) group IDs for a device configuration policy."""
                      url = f"{GRAPH_BASE}/deviceManagement/deviceConfigurations/{config_id}/assignments"
                      try:
                          resp = requests.get(url, headers=self._headers())
                          resp.raise_for_status()
                          assignments = resp.json().get("value", [])
                          include_ids, exclude_ids = set(), set()
                          for a in assignments:
                              target = a.get("target", {})
                              gid = target.get("groupId")
                              if not gid:
                                  continue
                              if target.get("@odata.type") == "#microsoft.graph.groupAssignmentTarget":
                                  include_ids.add(gid)
                              elif target.get("@odata.type") == "#microsoft.graph.exclusionGroupAssignmentTarget":
                                  exclude_ids.add(gid)
                          return include_ids, exclude_ids
                      except Exception as e:
                          logging.warning("Failed to get assignments for %s: %s", config_id, e)
                          return set(), set()

                  def get_settings_catalog_assignments(self, policy_id):
                      """Get current assignments for a Settings Catalog policy."""
                      url = f"https://graph.microsoft.com/beta/deviceManagement/configurationPolicies/{policy_id}/assignments"
                      try:
                          resp = requests.get(url, headers=self._headers())
                          resp.raise_for_status()
                          assignments = resp.json().get("value", [])
                          group_ids = set()
                          for a in assignments:
                              target = a.get("target", {})
                              if target.get("@odata.type") == "#microsoft.graph.groupAssignmentTarget":
                                  gid = target.get("groupId")
                                  if gid:
                                      group_ids.add(gid)
                          return group_ids
                      except Exception as e:
                          logging.warning("Failed to get Settings Catalog assignments for %s: %s", policy_id, e)
                          return set()

                  def get_app_assignments(self, app_id):
                      """Get current assignments for a mobile app."""
                      url = f"https://graph.microsoft.com/beta/deviceAppManagement/mobileApps/{app_id}/assignments"
                      try:
                          resp = requests.get(url, headers=self._headers())
                          resp.raise_for_status()
                          assignments = resp.json().get("value", [])
                          group_ids = set()
                          for a in assignments:
                              target = a.get("target", {})
                              if target.get("@odata.type") == "#microsoft.graph.groupAssignmentTarget":
                                  gid = target.get("groupId")
                                  if gid:
                                      group_ids.add(gid)
                          return group_ids
                      except Exception as e:
                          logging.warning("Failed to get app assignments for %s: %s", app_id, e)
                          return set()

                  def assign_policy(self, config_id, group_ids, policy_name="", exclude_group_ids=None):
                      """Assign policy, but only if assignments actually changed."""
                      desired = set(group_ids) if group_ids else set()
                      desired_exc = set(exclude_group_ids) if exclude_group_ids else set()
                      # Graph rejects the same group as both include and exclude
                      desired -= desired_exc
                      current, current_exc = self.get_policy_assignments(config_id)

                      if desired == current and desired_exc == current_exc:
                          logging.info("Policy '%s': assignments unchanged, skipping.", policy_name or config_id)
                          return False  # No change made

                      if not desired and not desired_exc:
                          logging.info("Policy '%s': clearing assignments.", policy_name or config_id)

                      body = {"assignments": [
                          {"target": {
                              "@odata.type": "#microsoft.graph.groupAssignmentTarget",
                              "groupId": gid
                          }} for gid in sorted(desired)
                      ] + [
                          {"target": {
                              "@odata.type": "#microsoft.graph.exclusionGroupAssignmentTarget",
                              "groupId": gid
                          }} for gid in sorted(desired_exc)
                      ]}
                      url  = f"{GRAPH_BASE}/deviceManagement/deviceConfigurations/{config_id}/assign"
                      resp = requests.post(url, headers=self._headers(), json=body)
                      if resp.status_code >= 400:
                          logging.error("Assign failed %s → %s", config_id, resp.text)
                      else:
                          logging.info("Assigned '%s' to %d group(s), %d exclusion(s).", policy_name or config_id, len(desired), len(desired_exc))
                      return True  # Change attempted

                  def assign_settings_catalog_policy(self, policy_id, group_ids, policy_name=""):
                      """Assign Settings Catalog policy, but only if assignments actually changed."""
                      desired = set(group_ids) if group_ids else set()
                      current = self.get_settings_catalog_assignments(policy_id)
                      
                      if desired == current:
                          logging.info("Settings Catalog '%s': assignments unchanged, skipping.", policy_name or policy_id)
                          return False
                      
                      if not group_ids:
                          logging.info("Settings Catalog '%s': clearing assignments.", policy_name or policy_id)
                          body = {"assignments": []}
                      else:
                          body = {"assignments": [
                              {"target": {
                                  "@odata.type": "#microsoft.graph.groupAssignmentTarget",
                                  "groupId": gid
                              }} for gid in group_ids
                          ]}
                      url  = f"https://graph.microsoft.com/beta/deviceManagement/configurationPolicies/{policy_id}/assign"
                      resp = requests.post(url, headers=self._headers(), json=body)
                      if resp.status_code >= 400:
                          logging.error("Settings Catalog assign failed %s → %s", policy_id, resp.text)
                      else:
                          logging.info("Assigned Settings Catalog '%s' to %d group(s).", policy_name or policy_id, len(group_ids))
                      return True

                  def assign_app(self, app_id, group_ids, app_name=""):
                      """Assign app, but only if assignments actually changed."""
                      desired = set(group_ids) if group_ids else set()
                      current = self.get_app_assignments(app_id)
                      
                      if desired == current:
                          logging.info("App '%s': assignments unchanged, skipping.", app_name or app_id)
                          return False
                      
                      if not group_ids:
                          body = {"mobileAppAssignments": []}
                      else:
                          body = {"mobileAppAssignments": [
                              {
                                  "@odata.type": "#microsoft.graph.mobileAppAssignment",
                                  "intent": "required",
                                  "target": {
                                      "@odata.type": "#microsoft.graph.groupAssignmentTarget",
                                      "groupId": gid
                                  }
                              } for gid in group_ids
                          ]}
                      
                      url  = f"https://graph.microsoft.com/beta/deviceAppManagement/mobileApps/{app_id}/assign"
                      resp = requests.post(url, headers=self._headers(), json=body)
                      if resp.status_code >= 400:
                          logging.error("App assign failed %s → %s", app_id, resp.text)
                      else:
                          logging.info("Assigned WinGet app '%s' to %d group(s).", app_name or app_id, len(group_ids))
                      return True
              
                  # ─── Windows Update — Feature Update Profiles + Hotpatch Policies ──
                  # Update Rings (windowsUpdateForBusinessConfiguration) live under
                  # /deviceConfigurations and reuse list_windows_configs / assign_policy
                  # above — only the two top-level endpoints need dedicated helpers.

                  def list_feature_update_profiles(self):
                      url = "https://graph.microsoft.com/beta/deviceManagement/windowsFeatureUpdateProfiles?$top=200"
                      results = []
                      while url:
                          resp = requests.get(url, headers=self._headers())
                          resp.raise_for_status()
                          data = resp.json()
                          results.extend(data.get("value", []))
                          url = data.get("@odata.nextLink")
                      return {p["displayName"]: p for p in results if p.get("displayName")}

                  def list_hotpatch_policies(self):
                      url = "https://graph.microsoft.com/beta/deviceManagement/windowsQualityUpdatePolicies?$top=200"
                      results = []
                      while url:
                          resp = requests.get(url, headers=self._headers())
                          resp.raise_for_status()
                          data = resp.json()
                          results.extend(data.get("value", []))
                          url = data.get("@odata.nextLink")
                      return {p["displayName"]: p for p in results if p.get("displayName")}

                  def _get_assignments_groupids(self, url):
                      try:
                          resp = requests.get(url, headers=self._headers())
                          resp.raise_for_status()
                          ids = set()
                          for a in resp.json().get("value", []):
                              t = a.get("target", {})
                              if t.get("@odata.type") == "#microsoft.graph.groupAssignmentTarget":
                                  gid = t.get("groupId")
                                  if gid:
                                      ids.add(gid)
                          return ids
                      except Exception as e:
                          logging.warning("Failed to get assignments at %s: %s", url, e)
                          return set()

                  def list_quality_update_profiles(self):
                      """Expedited quality update profiles (beta windowsQualityUpdateProfiles)."""
                      url = "https://graph.microsoft.com/beta/deviceManagement/windowsQualityUpdateProfiles?$top=200"
                      results = []
                      while url:
                          resp = requests.get(url, headers=self._headers())
                          resp.raise_for_status()
                          data = resp.json()
                          results.extend(data.get("value", []))
                          url = data.get("@odata.nextLink")
                      return {p["displayName"]: p for p in results if p.get("displayName")}

                  def delete_quality_update_profile(self, profile_id, name=""):
                      url = f"https://graph.microsoft.com/beta/deviceManagement/windowsQualityUpdateProfiles/{profile_id}"
                      resp = requests.delete(url, headers=self._headers())
                      if resp.status_code >= 400:
                          logging.error("Expedited profile delete failed %s → %s", profile_id, resp.text)
                          return False
                      logging.info("Deleted expedited profile '%s' (%s).", name or profile_id, profile_id)
                      return True

                  def _assign_via(self, assign_url, profile_id, group_ids, kind, name):
                      desired = set(group_ids) if group_ids else set()
                      list_url = assign_url[:-len("/assign")] + "/assignments"
                      current = self._get_assignments_groupids(list_url)
                      if desired == current:
                          logging.info("%s '%s': assignments unchanged, skipping.", kind, name or profile_id)
                          return False
                      body = {"assignments": [
                          {"target": {"@odata.type": "#microsoft.graph.groupAssignmentTarget",
                                      "groupId": gid}}
                          for gid in group_ids
                      ]} if group_ids else {"assignments": []}
                      resp = requests.post(assign_url, headers=self._headers(), json=body)
                      if resp.status_code >= 400:
                          logging.error("%s assign failed %s → %s", kind, profile_id, resp.text)
                      else:
                          logging.info("Assigned %s '%s' to %d group(s).", kind, name or profile_id, len(group_ids))
                      return True

                  def assign_feature_update_profile(self, profile_id, group_ids, name=""):
                      url = f"https://graph.microsoft.com/beta/deviceManagement/windowsFeatureUpdateProfiles/{profile_id}/assign"
                      return self._assign_via(url, profile_id, group_ids, "Feature Update", name)

                  def assign_hotpatch_policy(self, policy_id, group_ids, name=""):
                      url = f"https://graph.microsoft.com/beta/deviceManagement/windowsQualityUpdatePolicies/{policy_id}/assign"
                      return self._assign_via(url, policy_id, group_ids, "Hotpatch", name)

                  def clear_assignments(self, config_id, policy_name=""):
                      return self.assign_policy(config_id, [], policy_name)

                  def clear_settings_catalog_assignments(self, policy_id, policy_name=""):
                      return self.assign_settings_catalog_policy(policy_id, [], policy_name)
              
                  def clear_app_assignments(self, app_id, app_name=""):
                      return self.assign_app(app_id, [], app_name)
              
                  def delete_policy(self, config_id):
                      url  = f"{GRAPH_BASE}/deviceManagement/deviceConfigurations/{config_id}"
                      resp = requests.delete(url, headers=self._headers())
                      if resp.status_code >= 400:
                          logging.error("Delete failed %s → %s", config_id, resp.text)
                      else:
                          logging.info("Deleted policy %s.", config_id)
              
              # ─────────────────────────────── Manifest helpers ─────────────────────────
              def _norm(path: str) -> str:
                  """Return manifest key relative to MANIFESTS_ROOT, no extension, fwd slashes."""
                  p = path.replace("\\", "/")
                  if p.startswith(MANIFESTS_ROOT.replace("\\", "/")):
                      p = p[len(MANIFESTS_ROOT):]
                  p = p.lstrip("/").rstrip("/")
                  return p[:-5] if p.lower().endswith(".yaml") else p
              
              def _load_all_manifests(root: str) -> dict[str, dict]:
                  store = {}
                  for fp in pathlib.Path(root).rglob("*.yaml"):
                      with fp.open("r", encoding="utf-8") as f:
                          store[_norm(str(fp))] = yaml.safe_load(f) or {}
                  return store
              
              def _resolve_profiles_and_apps(key: str, store, cache, stack) -> tuple[set[str], set[str]]:
                  if key in cache:
                      return cache[key]
                  if key in stack:
                      logging.warning("Cyclic include: %s -> %s", " → ".join(stack), key)
                      return set(), set()
                  stack.add(key)
                  data  = store.get(key, {})
                  profs = set(p.strip() for p in (data.get("managed_profiles") or []) if p.strip())
                  apps = set(a.strip() for a in (data.get("managed_apps") or []) if a.strip())
                  for inc in data.get("included_manifests") or []:
                      inc_profs, inc_apps = _resolve_profiles_and_apps(_norm(inc), store, cache, stack)
                      profs |= inc_profs
                      apps |= inc_apps
                  stack.remove(key)
                  cache[key] = (profs, apps)
                  return profs, apps
              
              TOP_KEEP = {"Assigned", "Shared"}          # top-level manifests we *do* keep
              
              def _group_name_for_key(key: str) -> Optional[str]:
                  """
                  Build Devices-… Intune group name.
              
                  • Always include up to <location> (ignore allocation/device segment).
                  • Retain top-level Assigned.yaml and Shared.yaml.
                  • Skip every other top-level manifest.
                  """
                  segs = key.split("/")
              
                  # Keep only Assigned.yaml and Shared.yaml at top level
                  if len(segs) == 1 and segs[0] not in TOP_KEEP:
                      return None
              
                  # For Assigned or Shared with depth 5, strip the 5th (allocation/device)
                  if segs[0] in ("Assigned", "Shared") and len(segs) >= 5:
                      segs = segs[:4]
              
                  return "Devices-" + "-".join(segs)
              
              def load_manifests_with_inheritance(root: str) -> list[dict]:
                  store = _load_all_manifests(root)
                  cache = {}
                  rows  = []
                  for key in sorted(store):
                      gname = _group_name_for_key(key)
                      if not gname:
                          continue
                      profs, apps = _resolve_profiles_and_apps(key, store, cache, set())
                      if profs or apps:
                          rows.append({"group_name": gname, "profiles": profs, "apps": apps})
                  return rows
              
              def build_final_maps(rows):
                  profile_mapping = {}
                  app_mapping = {}
                  for r in rows:
                      for p in r["profiles"]:
                          profile_mapping.setdefault(p, set()).add(r["group_name"])
                      for a in r["apps"]:
                          app_mapping.setdefault(a, set()).add(r["group_name"])
                  return profile_mapping, app_mapping

              def walk_managed_key(data, key, parent_cond=None):
                  """Yield (name, condition_or_None) for entries under `key`, descending
                  conditional_items and AND-combining nested conditions."""
                  for entry in (data.get(key) or []):
                      if isinstance(entry, str) and entry.strip():
                          yield entry.strip(), parent_cond
                  for block in (data.get("conditional_items") or []):
                      cond = block.get("condition")
                      if not cond:
                          continue
                      combined = f"({parent_cond}) AND ({cond})" if parent_cond else cond
                      yield from walk_managed_key(block, key, combined)

              def load_manifest_uninstalls(root: str):
                  """Return list of (name, condition_or_None, group_name) from each
                  manifest's OWN managed_uninstalls (not inheritance-resolved). A name
                  here means devices under this manifest's group must not get it — the
                  native Munki signal we map to an Intune exclusionGroupAssignmentTarget."""
                  out = []
                  for fp in pathlib.Path(root).rglob("*.yaml"):
                      gname = _group_name_for_key(_norm(str(fp)))
                      if not gname:
                          continue
                      try:
                          with fp.open("r", encoding="utf-8") as f:
                              data = yaml.safe_load(f) or {}
                      except Exception as e:
                          logging.warning("Error reading manifest %s: %s", fp, e)
                          continue
                      for name, cond in walk_managed_key(data, "managed_uninstalls"):
                          out.append((name, cond, gname))
                  return out
              
              # ─────────────────────────────── profiles dir helper ─────────────────────────
              def load_profiles_repo_names() -> set[str]:
                  return {os.path.splitext(os.path.basename(pf))[0]
                          for pf in glob.glob("profiles/**/*.yaml", recursive=True)}

              def load_profile_exclude_groups() -> dict[str, set[str]]:
                  """Map profile displayName → Entra group names listed under
                  assignmentExcludeGroups in its profiles/ YAML. Exclusions beat
                  inclusions in Intune, so this carves a subtree out of a profile
                  that manifest inheritance would otherwise assign everywhere
                  (e.g. servers out of SharedWindowsUpdateRing)."""
                  excludes = {}
                  for pf in glob.glob("profiles/**/*.yaml", recursive=True):
                      try:
                          with open(pf, 'r', encoding='utf-8') as f:
                              data = yaml.safe_load(f) or {}
                          name = data.get('displayName')
                          groups = {g.strip() for g in (data.get('assignmentExcludeGroups') or []) if g and g.strip()}
                          if name and groups:
                              excludes[name] = groups
                      except Exception as e:
                          logging.warning("Error reading profile %s: %s", pf, e)
                  return excludes

              def load_settings_catalog_repo_names() -> set[str]:
                  # Settings Catalog profiles are in profiles/ directory and have settingsCatalog key
                  names = set()
                  for pf in glob.glob("profiles/**/*.yaml", recursive=True):
                      try:
                          with open(pf, 'r', encoding='utf-8') as f:
                              data = yaml.safe_load(f) or {}
                              # Only include if it has settingsCatalog (not omaSettings)
                              if data.get('displayName') and data.get('settingsCatalog'):
                                  names.add(data['displayName'])
                      except Exception:
                          pass
                  return names
              
              # ─────────────────────────────── apps manifest helper ─────────────────────────
              def load_apps_from_manifests() -> set[str]:
                  all_apps = set()
                  for mf in pathlib.Path(MANIFESTS_ROOT).rglob("*.yaml"):
                      try:
                          with mf.open("r", encoding="utf-8") as f:
                              data = yaml.safe_load(f) or {}
                              if data.get("managed_apps"):
                                  all_apps.update(data["managed_apps"])
                      except Exception as e:
                          logging.warning("Error reading manifest %s: %s", mf, e)
                  return all_apps
              
              # ─────────────────────────────────────────── MAIN ────────────────────────────
              def main():
                  credential = DefaultAzureCredential()
                  client = GraphAPIClient(credential)
              
                  # Handle Windows Configuration Profiles
                  all_configs   = client.list_windows_configs()
                  existing_profiles_disp = set(all_configs.keys())
                  logging.info("Found %d Windows configs in Intune.", len(existing_profiles_disp))

                  # Handle Settings Catalog Policies
                  all_catalog_policies = client.list_settings_catalog_policies()
                  existing_catalog_disp = set(all_catalog_policies.keys())
                  logging.info("Found %d Settings Catalog policies in Intune.", len(existing_catalog_disp))
              
                  # Handle WinGet Apps (modern Microsoft Store apps)
                  all_apps = client.list_win_get_apps()
                  existing_apps_disp = set(all_apps.keys())
                  logging.info("Found %d WinGet apps in Intune.", len(existing_apps_disp))
              
                  manifest_rows = load_manifests_with_inheritance(MANIFESTS_ROOT)
                  desired_profiles_map, desired_apps_map = build_final_maps(manifest_rows)
                  desired_profiles_disp = set(desired_profiles_map.keys())
                  desired_apps_disp = set(desired_apps_map.keys())
              
                  repo_profiles = load_profiles_repo_names()
                  repo_catalog = load_settings_catalog_repo_names()
                  repo_apps = load_apps_from_manifests()
                  profile_excludes = load_profile_exclude_groups()

                  # ── managed_uninstalls → Intune profile exclusions (native signal) ──
                  # A profile in a manifest's managed_uninstalls means "devices under this
                  # manifest's group must not get it". When the profile is assigned to a
                  # hyphen-ANCESTOR group the device inherits it, so we emit an
                  # exclusionGroupAssignmentTarget on this manifest's own group. Group
                  # names mirror the manifest tree, so the exclusion is meaningful iff its
                  # group is a strict hyphen-descendant of a group the profile is actually
                  # assigned to; anything else is inert and skipped. Conditional uninstalls
                  # would also need a filter (not supported) — logged and skipped.
                  # Gated by applyManagedExclusions: every run logs the plan; nothing is
                  # written until opted in. Complements the explicit assignmentExcludeGroups
                  # profile key (kept for cases that need a literal group name).
                  # NOTE: applied in the Configuration Profiles (deviceConfigurations) loop,
                  # which already supports exclusions; settings-catalog/app exclusions are
                  # plan-logged only for now (none exist today).
                  apply_managed_excl = os.getenv("APPLY_MANAGED_EXCLUSIONS", "").strip().lower() == "true"
                  managed_excl = {}            # profile name -> {group names to exclude}
                  skipped_conditional = []     # (name, cond, group)

                  def _is_descendant(child, ancestor):
                      return child.startswith(ancestor + "-")

                  for name, cond, group in load_manifest_uninstalls(MANIFESTS_ROOT):
                      if name not in desired_profiles_map:
                          continue  # not assigned as a profile anywhere -> inert / not ours
                      if not any(_is_descendant(group, a) for a in desired_profiles_map[name]):
                          continue  # not inherited from an ancestor here -> exclusion inert
                      if cond is not None:
                          skipped_conditional.append((name, cond, group))
                          continue
                      managed_excl.setdefault(name, set()).add(group)

                  total_me = sum(len(v) for v in managed_excl.values())
                  me_mode = "APPLY" if apply_managed_excl else "DRY-RUN (log only; rerun with applyManagedExclusions=true to apply)"
                  logging.info("managed_uninstalls -> profile exclusions [%s]: %d exclusion(s) across %d profile(s).",
                               me_mode, total_me, len(managed_excl))
                  for name in sorted(managed_excl):
                      for group in sorted(managed_excl[name]):
                          logging.info("  EXCLUDE %s from profile '%s'", group, name)
                  for name, cond, group in skipped_conditional:
                      logging.warning("  SKIPPED conditional exclusion: '%s' on %s (condition '%s' not supported)", name, group, cond)

                  # Track statistics
                  stats = {"updated": 0, "unchanged": 0, "cleared": 0}

                  # Process Configuration Profiles
                  logging.info("Processing %d Configuration Profiles...", len(existing_profiles_disp))
                  for name in sorted(existing_profiles_disp):
                      cfg_id = all_configs[name]["id"]
                      if name in ("Security Patches for Assigned Devices",
                                  "Security Patches for Shared Devices"):
                          continue

                      if name not in desired_profiles_disp:
                          if client.clear_assignments(cfg_id, name):
                              stats["cleared"] += 1
                          continue

                      gids = [client.get_group_id(g)
                              for g in sorted(desired_profiles_map[name]) if client.get_group_id(g)]
                      ex_names = set(profile_excludes.get(name, set()))
                      if apply_managed_excl:
                          ex_names |= managed_excl.get(name, set())
                      ex_gids = [client.get_group_id(g)
                                 for g in sorted(ex_names) if client.get_group_id(g)]
                      if client.assign_policy(cfg_id, gids, name, exclude_group_ids=ex_gids):
                          stats["updated"] += 1
                      else:
                          stats["unchanged"] += 1

                  # Process Settings Catalog Policies
                  logging.info("Processing %d Settings Catalog Policies...", len(existing_catalog_disp))
                  for name in sorted(existing_catalog_disp):
                      policy_id = all_catalog_policies[name]["id"]
                      if name in ("Default Security Baseline", "Microsoft Edge Security Settings"):
                          continue
                      # "Local Admins -*" policies are owned by the Entra repo
                      # (entra-local-admin-policies-push.yml), which assigns them to
                      # Devices-All from each policy YAML. Skip them here so this
                      # manifest-driven reconciler never clears those assignments.
                      if name.startswith("Local Admins"):
                          continue
              
                      if name not in desired_profiles_disp:
                          if client.clear_settings_catalog_assignments(policy_id, name):
                              stats["cleared"] += 1
                          continue
              
                      gids = [client.get_group_id(g)
                              for g in sorted(desired_profiles_map[name]) if client.get_group_id(g)]
                      if client.assign_settings_catalog_policy(policy_id, gids, name):
                          stats["updated"] += 1
                      else:
                          stats["unchanged"] += 1
                  
                  # Process WinGet Apps (modern Microsoft Store apps)
                  logging.info("Processing %d WinGet Apps...", len(existing_apps_disp))
                  for name in sorted(existing_apps_disp):
                      app_id = all_apps[name]["id"]
                      
                      if name not in desired_apps_disp:
                          if client.clear_app_assignments(app_id, name):
                              stats["cleared"] += 1
                          continue
                      
                      gids = [client.get_group_id(g) 
                              for g in sorted(desired_apps_map[name]) if client.get_group_id(g)]
                      if client.assign_app(app_id, gids, name):
                          stats["updated"] += 1
                      else:
                          stats["unchanged"] += 1

                  # Process Feature Update Profiles. We *don't* clear assignments on
                  # profiles missing from manifests — old portal-managed profiles
                  # like "Run Now (Windows 11 25H2)" should be deleted by a human,
                  # not silently de-assigned by this pipeline.
                  all_feature = client.list_feature_update_profiles()
                  logging.info("Processing %d Feature Update Profiles...", len(all_feature))
                  for name in sorted(all_feature.keys()):
                      pid = all_feature[name]["id"]
                      if name not in desired_profiles_disp:
                          continue
                      gids = [client.get_group_id(g)
                              for g in sorted(desired_profiles_map[name]) if client.get_group_id(g)]
                      if client.assign_feature_update_profile(pid, gids, name):
                          stats["updated"] += 1
                      else:
                          stats["unchanged"] += 1

                  # Process Hotpatch Policies (same don't-touch-strangers rule)
                  all_hotpatch = client.list_hotpatch_policies()
                  logging.info("Processing %d Hotpatch Policies...", len(all_hotpatch))
                  for name in sorted(all_hotpatch.keys()):
                      pid = all_hotpatch[name]["id"]
                      if name not in desired_profiles_disp:
                          continue
                      gids = [client.get_group_id(g)
                              for g in sorted(desired_profiles_map[name]) if client.get_group_id(g)]
                      if client.assign_hotpatch_policy(pid, gids, name):
                          stats["updated"] += 1
                      else:
                          stats["unchanged"] += 1

                  logging.info("Assignment summary: %d updated, %d unchanged, %d cleared",
                              stats["updated"], stats["unchanged"], stats["cleared"])

                  # ── Windows Update cutover: retire legacy portal-managed rings ──
                  # Each legacy ring is deleted only once its policy-as-code
                  # replacement exists in Intune AND is referenced by manifests, so
                  # devices are never left without a ring. See
                  # docs/intune-windows-update-pre-cutover-baseline.md for recovery.
                  legacy_ring_map = {
                      "Security Patches for Assigned Devices": "AssignedWindowsUpdateRing",
                      "Security Patches for Shared Devices":   "SharedWindowsUpdateRing",
                  }
                  for legacy, replacement in legacy_ring_map.items():
                      if legacy not in all_configs:
                          continue
                      if replacement in all_configs and replacement in desired_profiles_disp:
                          logging.info("Cutover: deleting legacy ring '%s' (replaced by '%s').", legacy, replacement)
                          client.delete_policy(all_configs[legacy]["id"])
                      else:
                          logging.warning("Cutover: keeping legacy ring '%s' — replacement '%s' not live and assigned yet.", legacy, replacement)

                  # ── Guard: Shared devices must never get daytime forced reboots ──
                  # Expedited quality update profiles ignore the ring's overnight
                  # install window (deadline reboots can land mid-day). Only the
                  # cimian-intune-windowspatch.yml pipeline may expedite Shared
                  # (names Expedited-YYYY-MM-DD-*); anything else targeting a
                  # Devices-Shared* group — e.g. created by hand in the portal —
                  # is deleted here.
                  shared_gids = set()
                  for gname in {"Devices-Shared"} | {r["group_name"] for r in manifest_rows
                                                     if r["group_name"].startswith("Devices-Shared")}:
                      gid = client.get_group_id(gname)
                      if gid:
                          shared_gids.add(gid)
                  for name, prof in client.list_quality_update_profiles().items():
                      if name.startswith("Expedited-"):
                          continue
                      assigned = client._get_assignments_groupids(
                          f"https://graph.microsoft.com/beta/deviceManagement/windowsQualityUpdateProfiles/{prof['id']}/assignments")
                      if assigned & shared_gids:
                          logging.warning("Guard: expedited profile '%s' targets Shared devices outside policy-as-code — deleting.", name)
                          client.delete_quality_update_profile(prof["id"], name)

                  # Check for missing profiles
                  missing_profiles = desired_profiles_disp - existing_profiles_disp - existing_catalog_disp
                  for m in sorted(missing_profiles):
                      if m in repo_profiles:
                          logging.warning("Profile '%s' referenced in manifests but not pushed to Intune.", m)
                      elif m in repo_catalog:
                          logging.warning("Settings Catalog policy '%s' referenced in manifests but not pushed to Intune.", m)
                  
                  # Check for missing apps
                  missing_apps = desired_apps_disp - existing_apps_disp
                  for m in sorted(missing_apps):
                      if m in repo_apps:
                          logging.warning("App '%s' referenced in manifests but not available in Intune.", m)
              
              if __name__ == "__main__":
                  main()
              '@
              $scriptFile = Join-Path $env:AGENT_TEMPDIRECTORY 'assign-groups.py'
              Set-Content -Path $scriptFile -Value $py -Encoding utf8
              python $scriptFile