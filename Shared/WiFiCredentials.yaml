# Reference: https://learn.microsoft.com/en-us/windows/client-management/mdm/wifi-csp
#            https://learn.microsoft.com/en-us/windows/client-management/mdm/certificatestore-csp
#
# Windows equivalent of the macOS WiFiCredentials profile for EXAMPLE_WIFI network.
# Configures WPA2-Enterprise with PEAP/MSCHAPv2 authentication against radius.example.com.
#
# IMPORTANT - Credentials:
#   Shared username/password credentials cannot be embedded in the Windows WLAN XML.
#   On first connect, users will be prompted for credentials.
#   To avoid this, consider deploying a native Intune Wi-Fi configuration profile
#   (Device > Configuration > Wi-Fi > Enterprise) which supports pre-provisioning
#   credentials, or use Group Policy Preferences to cache the credentials.
#
# NOTE - Certificate Expiry:
#   The RADIUS server certificate (radius.example.com) expires 2026-07-20.
#   This profile will need to be updated with the renewed certificate before then.

displayName: "WiFiCredentials"
description: "Configures EXAMPLE_WIFI enterprise Wi-Fi with WPA2-Enterprise PEAP/MSCHAPv2 and RADIUS server certificate trust"
identifier: "com.example.winadmins.WiFiCredentials"
version: "2026.02.06"

applicability:
  osEditions:
    - "Windows 11 Enterprise"
  minVersion: "21H2"

omaSettings:
  # ─────────────────────────────────────────────────────────────
  # 1. RADIUS Server Certificate — push to Trusted Root CA store
  #    so Windows trusts radius.example.com during PEAP handshake
  # ─────────────────────────────────────────────────────────────
  - name: "RADIUS Server Certificate (radius.example.com)"
    description: "Installs the RADIUS server certificate into the device trusted root store for PEAP server validation. Issued by RapidSSL TLS RSA CA G1 (DigiCert). Expires 2026-07-20."
    dataType: Base64
    omaUri: "./Device/Vendor/MSFT/CertificateStore/Root/Certificates/0000000000000000000000000000000000000000"
    value: "REPLACE_WITH_BASE64_DER_OF_YOUR_RADIUS_SERVER_CERTIFICATE"

  # ─────────────────────────────────────────────────────────────
  # 2. Wi-Fi Profile — EXAMPLE_WIFI WPA2-Enterprise PEAP/MSCHAPv2
  #    Matches the macOS WiFiCredentials profile configuration
  # ─────────────────────────────────────────────────────────────
  - name: "EXAMPLE_WIFI Wi-Fi Profile"
    description: "WPA2-Enterprise Wi-Fi profile for EXAMPLE_WIFI SSID using PEAP/MSCHAPv2 with RADIUS server validation"
    dataType: "String"
    omaUri: "./Device/Vendor/MSFT/WiFi/Profile/EXAMPLE%5FWIFI/WlanXml"
    value: |
      <WLANProfile xmlns="http://www.microsoft.com/networking/WLAN/profile/v1">
        <name>EXAMPLE_WIFI</name>
        <SSIDConfig>
          <SSID>
            <name>EXAMPLE_WIFI</name>
          </SSID>
          <nonBroadcast>false</nonBroadcast>
        </SSIDConfig>
        <connectionType>ESS</connectionType>
        <connectionMode>auto</connectionMode>
        <autoSwitch>false</autoSwitch>
        <MSM>
          <security>
            <authEncryption>
              <authentication>WPA2</authentication>
              <encryption>AES</encryption>
              <useOneX>true</useOneX>
            </authEncryption>
            <PMKCacheMode>enabled</PMKCacheMode>
            <PMKCacheTTL>720</PMKCacheTTL>
            <PMKCacheSize>128</PMKCacheSize>
            <preAuthMode>disabled</preAuthMode>
            <OneX xmlns="http://www.microsoft.com/networking/OneX/v1">
              <authMode>machine</authMode>
              <EAPConfig>
                <EapHostConfig xmlns="http://www.microsoft.com/provisioning/EapHostConfig">
                  <EapMethod>
                    <Type xmlns="http://www.microsoft.com/provisioning/EapCommon">25</Type>
                    <VendorId xmlns="http://www.microsoft.com/provisioning/EapCommon">0</VendorId>
                    <VendorType xmlns="http://www.microsoft.com/provisioning/EapCommon">0</VendorType>
                    <AuthorId xmlns="http://www.microsoft.com/provisioning/EapCommon">0</AuthorId>
                  </EapMethod>
                  <Config xmlns="http://www.microsoft.com/provisioning/EapHostConfig">
                    <Eap xmlns="http://www.microsoft.com/provisioning/BaseEapConnectionPropertiesV1">
                      <Type>25</Type>
                      <EapType xmlns="http://www.microsoft.com/provisioning/MsPeapConnectionPropertiesV1">
                        <ServerValidation>
                          <DisableUserPromptForServerValidation>true</DisableUserPromptForServerValidation>
                          <ServerNames>radius.example.com</ServerNames>
                          <TrustedRootCA>0000000000000000000000000000000000000000</TrustedRootCA>
                        </ServerValidation>
                        <FastReconnect>true</FastReconnect>
                        <InnerEapOptional>false</InnerEapOptional>
                        <Eap xmlns="http://www.microsoft.com/provisioning/BaseEapConnectionPropertiesV1">
                          <Type>26</Type>
                          <EapType xmlns="http://www.microsoft.com/provisioning/MsChapV2ConnectionPropertiesV1">
                            <UseWinLogonCredentials>false</UseWinLogonCredentials>
                          </EapType>
                        </Eap>
                        <EnableQuarantineChecks>false</EnableQuarantineChecks>
                        <RequireCryptoBinding>false</RequireCryptoBinding>
                      </EapType>
                    </Eap>
                  </Config>
                </EapHostConfig>
              </EAPConfig>
            </OneX>
          </security>
        </MSM>
        <MacRandomization xmlns="http://www.microsoft.com/networking/WLAN/profile/v3">
          <enableRandomization>false</enableRandomization>
        </MacRandomization>
      </WLANProfile>

  # ─────────────────────────────────────────────────────────────
  # 3. Disable MAC Randomization globally for Wi-Fi
  #    Matches macOS DisableAssociationMACRandomization: true
  # ─────────────────────────────────────────────────────────────
  - name: "Disable Wi-Fi MAC Randomization"
    description: "Disables random hardware (MAC) addresses for Wi-Fi connections to ensure consistent device identification on the network"
    dataType: "Integer"
    omaUri: "./Device/Vendor/MSFT/WiFi/AllowMACAddressRandomization"
    value: "0"
