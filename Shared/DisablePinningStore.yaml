# Reference: https://learn.microsoft.com/en-us/windows/client-management/mdm/policy-csp-admx-taskbar#nopinningstoretotaskbar

displayName: "DisablePinningStore"
identifier: "com.example.winadmins.NoPinningStoreToTaskbar"
description: "Prevents users from pinning Microsoft Store app to Taskbar"
category: System
version: 2025.03.25

applicability:
  osEditions:
    - "Windows 11 Enterprise"
  minVersion: "21H2"

omaSettings:
  - name: "Do not allow pinning Store app to the Taskbar"
    dataType: "Integer"
    omaUri: "./User/Vendor/MSFT/Policy/Config/ADMX_Taskbar/NoPinningStoreToTaskbar"
    value: "1"
