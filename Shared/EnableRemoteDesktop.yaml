# Reference: https://www.reddit.com/r/Intune/comments/vy69k8/enable_remote_desktop/

displayName: "EnableRemoteDesktop"
description: "Enable Remote Desktop on Shared Devices"
identifier: "com.example.winadmins.EnableRemoteDesktop"
version: 2025.10.08

applicability:
  osEditions:
    - "Windows 11 Enterprise"
  minVersion: "21H2"

omaSettings:
  - name: "Enable Remote Desktop"
    description: "Enable Remote Desktop"
    dataType: "String (XML file)"
    omaUri: "./Device/Vendor/MSFT/Policy/Config/RemoteDesktopServices/AllowUsersToConnectRemotely"
    value: |-
      <enabled/>

