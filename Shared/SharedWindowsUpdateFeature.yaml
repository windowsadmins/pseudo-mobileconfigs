# Reference: https://learn.microsoft.com/en-us/graph/api/resources/intune-softwareupdate-windowsfeatureupdateprofile
#
# Feature Update pin for Shared (multi-user) endpoints — classroom labs,
# kiosks, render nodes. Supports gradual batched rollout for the curriculum
# fleet during peak season (semester start, critique week, finals).
#
# Steady-state (off-peak): rolloutSettings empty → offer immediately.
# Peak season: uncomment and set the offer window block. Intune spreads
# devices randomly across the window so no two labs upgrade the same day.

displayName: "SharedWindowsUpdateFeature"
description: "Current Windows 11 GA feature release pinned for Shared endpoints. rolloutSettings carries the gradual-rollout window when we're in peak season."
identifier: "com.example.winadmins.SharedWindowsUpdateFeature"
version: 2026.05.16

applicability:
  osEditions:
    - "Windows 11 Enterprise"

windowsUpdate:
  type: featureUpdateProfile
  featureUpdateVersion: "Windows 11, version 25H2"
  installLatestWindows10OnWindows11IneligibleDevice: false
  installFeatureUpdatesOptional: false
  # ── Default: no offer window, devices get it right away ────────────────
  rolloutSettings: {}
  # ── Peak-season example: spread across 6 weeks, batch every 7 days ────
  # rolloutSettings:
  #   offerStartDateTimeInUTC: "2026-09-08T00:00:00Z"
  #   offerEndDateTimeInUTC:   "2026-10-20T00:00:00Z"
  #   offerIntervalInDays:     7
