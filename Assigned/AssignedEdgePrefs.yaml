# Reference: https://learn.microsoft.com/en-us/deployedge/configure-edge-with-mdm

displayName: "AssignedEdgePrefs"
description: "Sets preferences for Microsoft Edge to improve security and privacy."
identifier: "com.example.winadmins.AssignedEdgePrefs"
version: 2025.04.03

applicability:
  osEditions:
    - "Windows 11 Enterprise"
  minVersion: "21H2"

omaSettings:
  - name: "Enable Tracking Prevention"
    description: "Set Microsoft Edge Tracking Prevention to Balanced"
    dataType: Integer
    omaUri: "./Device/Vendor/MSFT/Policy/Config/Edge~Policy~microsoftedge~Privacy/TrackingPrevention"
    value: "1"

  - name: "Enable Do Not Track"
    description: "Enable Do Not Track in Microsoft Edge"
    dataType: Boolean
    omaUri: "./Device/Vendor/MSFT/Policy/Config/Edge~Policy~microsoftedge~Privacy/DoNotTrack"
    value: true

  - name: "Enable SmartScreen Defender"
    description: "Enable SmartScreen Defender in Microsoft Edge"
    dataType: Boolean
    omaUri: "./Device/Vendor/MSFT/Policy/Config/Edge~Policy~microsoftedge~Security/SmartScreenEnabled"
    value: true

  - name: "Disable ActiveX"
    description: "Disable ActiveX controls"
    dataType: Boolean
    omaUri: "./Device/Vendor/MSFT/Policy/Config/InternetExplorer/DisableActiveX"
    value: true

  - name: "Enable Enhance your security on the web"
    description: "Enable Enhance your security on the web in Microsoft Edge"
    dataType: Boolean
    omaUri: "./Device/Vendor/MSFT/Policy/Config/Edge~Policy~microsoftedge~Security/EnhancedSecurityEnabled"
    value: true

  - name: "Block Potentially Unwanted Apps"
    description: "Block Potentially Unwanted Apps"
    dataType: Integer
    omaUri: "./Device/Vendor/MSFT/Policy/Config/Edge~Policy~microsoftedge~Security/SmartScreenBlockPUA"
    value: "1"

  - name: "Enable Video Enhancement"
    description: "Enable Video Enhancement"
    dataType: Boolean
    omaUri: "./Device/Vendor/MSFT/Policy/Config/Edge~Policy~microsoftedge~Media/VideoEnhancementEnabled"
    value: true